name: Auto-merge routine PRs

# Enables auto-merge for trivial/easy non-design auto-routine PRs.
# GitHub's built-in auto-merge then merges once Vercel's check passes.
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Per-PR concurrency: opened, labeled, and ready_for_review can fire in
# rapid succession on the same PR. Without a workflow-level group, two
# attempts to enable auto-merge race; the second is a noisy no-op against
# GitHub's idempotency check. Per-PR scoping keeps cross-PR work
# parallel while serialising same-PR runs.
concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  maybe-auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Check labels and enable auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels) }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          python3 - <<'PY'
          import json, os, re, subprocess, sys

          pr_labels = {l['name'] for l in json.loads(os.environ['PR_LABELS'])}

          # Only act on auto-routine PRs
          if 'auto-routine' not in pr_labels:
              print("Not auto-routine — skipping.")
              sys.exit(0)

          # Parse linked issue number from PR body ("Fixes #N" or "Closes #N")
          body = os.environ.get('PR_BODY', '')
          m = re.search(r'(?:Fixes|Closes|Resolves)\s+#(\d+)', body, re.IGNORECASE)
          if not m:
              print("No linked issue found in PR body — skipping auto-merge.")
              sys.exit(0)

          issue_num = m.group(1)

          # Fetch issue labels
          result = subprocess.run(
              ['gh', 'issue', 'view', issue_num,
               '--repo', 'palimkarakshay/lumivara-site',
               '--json', 'labels'],
              capture_output=True, text=True, check=True
          )
          issue_labels = {l['name'] for l in json.loads(result.stdout)['labels']}

          all_labels = pr_labels | issue_labels

          # Only trivial/easy get auto-merged
          auto_ok = {'complexity/trivial', 'complexity/easy'}
          if not (all_labels & auto_ok):
              print(f"Issue #{issue_num} is not trivial/easy — requires human review.")
              sys.exit(0)

          # Design/visual changes need a human eye
          block = {'type/design-cosmetic', 'area/design'}
          if all_labels & block:
              print(f"Issue #{issue_num} is a design change — human confirmation required.")
              sys.exit(0)

          # Codex consistency review gate. codex-review.yml runs on every PR
          # opened/synchronize and applies `codex-blockers` whenever the
          # review surfaces blocker/major findings or a `request-changes`
          # verdict. Until those are addressed (operator removes the label,
          # or codex-pr-fix.yml lands a follow-up commit and a re-review
          # comes back clean), do NOT enable auto-merge. This keeps Codex's
          # consistency recommendations from being silently skipped.
          if 'codex-blockers' in pr_labels:
              print("Codex review flagged blocker/major findings — auto-merge "
                    "blocked until codex-blockers is removed.")
              sys.exit(0)

          # Both review engines were unavailable when this PR opened
          # (OpenAI quota + Gemini quota or missing keys). The hourly
          # recheck cron (codex-review-recheck.yml) will retry. Until a
          # successful review posts and removes this label, do NOT
          # auto-merge — shipping unreviewed code is exactly what the
          # consistency gate is meant to prevent.
          if 'review-deferred' in pr_labels:
              print("Review deferred (both review engines were unavailable). "
                    "Auto-merge blocked until codex-review-recheck.yml retries "
                    "and the review-deferred label is cleared.")
              sys.exit(0)

          pr = os.environ['PR_NUMBER']
          print(f"Enabling auto-merge (squash) on PR #{pr} for issue #{issue_num}.")
          subprocess.run(
              ['gh', 'pr', 'merge', pr, '--auto', '--squash',
               '--repo', 'palimkarakshay/lumivara-site'],
              check=True
          )
          print("Auto-merge enabled. PR will merge once Vercel check passes.")
          PY
