<h1 id="lumivara-forge">Lumivara Forge</h1>
<h3 id="master-deck--the-nine-questions-one-source-of-truth">Master deck — the nine questions, one source of truth</h3>
<p>What we sell, who we sell it to, who we sell against, where the business is going, and what it costs to get there.</p>
<br />
<p><em>Compiled 2026-04-30 (refreshed end-of-day after the same-day pipeline-lane work landed: brand + domain ADR <code>15c</code>, extended five-leg <code>codex-review</code> fallback ladder, <code>llm-monitor</code> bot self-awareness pipeline, <code>record-ingest</code> operator recording pipeline, doc-task seeder per OWASP LLM08, plumber + recruiter vertical templates promoted Stub → Full, PIPEDA breach-notification research seed, <strong>and the new per-vertical sales playbook pack at <code>docs/mothership/sales-verticals/</code></strong> — six templates (doctors, dentists, lawyers, accountants, physiotherapy, optometry) promoted from index-only to Full as the structured response to the advisor pushback that the operator-side stack is &quot;over-engineered crap that won't ever sell&quot;; see <a href="./05-advisor-deck.md"><code>docs/decks/05-advisor-deck.md</code></a> Contested claim 6 for the rebuttal). Reconciles <code>docs/storefront/06-positioning-slide-deck.md</code> (operator-internal nine-questions deck) with the five stakeholder decks in <code>docs/decks/01</code>–<code>05</code>.</em></p>
<p><span class="small">Operator-scope deck — confidential. Stakeholder-specific subsets live in <code>docs/decks/01</code>–<code>05</code>. Every load-bearing statistic cites a <code>[V]</code> / <code>[S]</code> / <code>[C]</code> row in <code>docs/research/03-source-bibliography.md</code>. <strong>Brand-name reconsideration (D2) is open</strong> per <a href="../mothership/15c-brand-and-domain-decision.md"><code>docs/mothership/15c-brand-and-domain-decision.md</code></a>; this deck continues to use <code>Lumivara Forge</code> as a placeholder until D2 lands.</span></p>

<p>Nine numbered sections, in this exact order, each with a section recap slide:</p>

<li><strong>Differentiators</strong> — what we provide that others don't</li>

<li><strong>Competitor claims</strong> — what the alternatives say they offer</li>
<li><strong>End goal</strong> — what this business is, fully grown</li>
<li><strong>Steps to get there</strong> — milestones in order</li>
<li><strong>Project plan</strong> — phased buildout, today through year 1</li>
<li><strong>Challenges</strong> — risks that can knock us off course</li>
<li><strong>Resources required</strong> — money, time, tooling, people</li>
</ol>

<h2 id="six-things-only-we-ship-today">Six things only we ship today</h2>
<ol>
<li><strong>Phone-as-CMS</strong> over a real codebase. A shortcut on the client's phone routes through n8n + Claude into a GitHub PR with a Vercel preview. No CMS to log into. (<code>docs/ADMIN_PORTAL_PLAN.md</code>.)</li>
<li><strong>Multi-vendor AI fallback ladder.</strong> Claude Opus 4.7 primary on every stage; on outage the path falls through Gemini 2.5 Pro → Gemini 2.5 Flash → GitHub Models (Llama 3.3-70B + GPT-4.1-mini) → OpenRouter (DeepSeek R1 + Qwen3-Coder, both free tier) before deferring. The five-leg <code>codex-review</code> ladder is the deepest, but every stage has at least a primary + two fallbacks. Single-vendor outage never blocks the queue. (<code>docs/AI_ROUTING.md</code>; <code>scripts/codex-review-fallback.py</code>.)</li>
<li><strong>Plan-then-Execute pipeline.</strong> Every routine issue gets a structured AI plan as a PR comment <em>before</em> code is written. The client reads the plan first.</li>
<li><strong>Tier-based cadence with 24/7 utilisation.</strong> T0 manual, T1 daily, T2 every 2h, T3 hourly <em>plus</em> the operator-side watch tier — <code>triage</code> every 15 min and <code>llm-monitor-watch</code> every 15 min — so the bot's &quot;energy&quot; is a sold dial <em>and</em> the queue never sleeps. (<code>docs/mothership/04-tier-based-agent-cadence.md</code>; <code>docs/AI_ROUTING.md §1</code>.)</li>
<li><strong>Two-repo isolation (Dual-Lane Repo).</strong> Client gets a clean <code>&lt;slug&gt;-site</code> repo (private → transferable). The pipeline, prompts, and operator IP live in a separate <code>&lt;slug&gt;-pipeline</code> repo the client never sees. (<code>docs/mothership/02b-dual-lane-architecture.md</code>.)</li>
<li><strong>Bot self-awareness pipeline.</strong> <code>llm-monitor</code> watches Anthropic / Gemini / OpenAI status pages, four LLM-bot RSS feeds, and a Stack Overflow collector, then auto-rewrites <code>KNOWN_ISSUES.md</code> and <code>RECOMMENDATIONS.md</code>. Triage / plan / execute prompts ingest those files at runtime, so when an upstream provider quirk lands, the fleet steers around it without a human in the loop. (<code>docs/mothership/llm-monitor/runbook.md</code>.)</li>
</ol>
</section>

<h2 id="why-each-of-those-is-hard-to-copy">Why each of those is hard to copy</h2>
<table>
<thead>
<tr>
<th>Feature</th>
<th>What protects it</th>
</tr>
</thead>
<tbody>
<tr>
<td>Phone-as-CMS</td>
<td>Requires Auth.js v5 + n8n workflows + HMAC + Octokit + Vercel deploy hooks wired together. ~5 phases of build (<code>docs/ADMIN_PORTAL_PLAN.md</code>).</td>
</tr>
<tr>
<td>Multi-vendor fallback</td>
<td>Requires <em>five</em> live API surfaces (Anthropic + Google + OpenAI + GitHub Models + OpenRouter), a deterministic router, prompt-pack parity across providers, and per-stage probes that detect &quot;the model returned 200 but the body is unfinished.&quot; Most freelancers hold one key.</td>
</tr>
<tr>
<td>Plan-then-Execute</td>
<td>Every routine issue gets an AI-authored plan comment before code lands. Few competitors run this gate at all.</td>
</tr>
<tr>
<td>Tier cadence + watch tier</td>
<td>The pipeline reads tier from a per-client variable; cron, model selection, and auto-merge gates all branch on it. The watch-tier (<code>triage</code> every 15 min + <code>llm-monitor-watch</code> every 15 min + <code>llm-monitor</code> sweep every 2h) keeps the queue moving 24/7. Not a feature flag — a whole product surface.</td>
</tr>
<tr>
<td>Dual-Lane Repo isolation</td>
<td>A GitHub App + two-repo split + per-engagement install ID. Operator IP stays operator-side; the client repo is genuinely &quot;vanilla&quot; if they ever leave.</td>
</tr>
<tr>
<td>Bot self-awareness</td>
<td><code>llm-monitor</code> ingests provider status, RSS, Stack Overflow → auto-rewrites <code>KNOWN_ISSUES.md</code> + <code>RECOMMENDATIONS.md</code> → the fleet's prompts read those files. The whole closed loop is operator-hosted; competitors copying any one piece wouldn't get the compounding effect.</td>
</tr>
</tbody>
</table>
<p>The site is a commodity. The <strong>system around the site</strong> is the moat.</p>
</section>

<h2 id="what-we-deliberately-do-not-sell">What we deliberately do NOT sell</h2>
<ul>
<li><strong>Not a SaaS.</strong> No self-serve onboarding, no shared multi-tenant DB, no public sign-up. (<code>docs/mothership/01-business-plan.md §6</code>.)</li>
<li><strong>Not an agency.</strong> No PMs, no design team, no employees. The operator runs everything until ~30 clients.</li>
<li><strong>Not a hosting company.</strong> The client's hosting account is the client's, in their name, on their card by month 1.</li>
<li><strong>Not a white-label reseller.</strong> Tier 4 exists for agencies but is not promoted; quoted custom at 2× T3 minimum.</li>
<li><strong>Not Shopify / e-commerce.</strong> Wrong stack — referred elsewhere.</li>
</ul>
<p>The boundaries <em>are</em> the strategy. They keep the operator under 175 hours a month at saturation and keep the moat intact.</p>
</section>

<h2 id="why-our-negative-list-is-detailed--the-things-competitors-lie-about">Why our negative list is detailed — the things competitors lie about</h2>
<p>Operator-pitch reference: every promise below is what a competitor in <em>some</em> vertical has tried to sell our prospects in the last 6 months. Each is a regulator-citable failure, a platform-TOS-citable failure, or both. Source-of-truth reasoning lives in <code>docs/mothership/sales-verticals/00a-negative-list-rationale.md</code>; the slide-level detail per vertical lives in <code>docs/decks/vertical-pitches/&lt;vertical&gt;.md</code>.</p>
<table>
<thead>
<tr>
<th>Promise we will not make</th>
<th>Why we will not make it</th>
<th>What we sell instead</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>&quot;Guaranteed first-page Google ranking.&quot;</strong></td>
<td>(a) Every vertical regulator we sell under prohibits ranking guarantees as unsupported comparative / outcome claims (CPSO §2 <em>Advertising</em>; RCDSO §6; LSO §4.2; CPA Ontario Rule 402; COO; College of Physiotherapists). (b) Google <em>Search Essentials</em> state plainly no SEO firm can guarantee a ranking. (c) AI Overviews / AI Mode / ChatGPT / Perplexity are now answering a meaningful share of informational queries before any click — &quot;rank #1&quot; thinking is already obsolete.</td>
<td>Core Web Vitals ≥ 90 mobile, JSON-LD schema for the entities Google + AI Overviews quote, WCAG 2.1 AA accessibility, 301-redirect map at migration, content freshness from owner dictation. Bundled into the monthly improvement run; no separate &quot;SEO retainer&quot; line.</td>
</tr>
<tr>
<td><strong>&quot;Public-facing AI chatbot / receptionist.&quot;</strong></td>
<td>A bot that doesn't know the licensee's scope-of-practice generates clinical / legal / financial advice the licensee carries the liability for. <em>Moffatt v. Air Canada</em> (2024 BCCRT 149) made the precedent explicit. Privilege exposure (legal); covered-entity scope (healthcare); unauthorised-practice exposure (accounting / optometry).</td>
<td>AI lives operator-side, in the editorial pipeline. The public site has real Book Now / Contact buttons. The AI never speaks to a customer; it speaks only to us.</td>
</tr>
<tr>
<td><strong>&quot;Set-and-forget content marketing — we'll write your blog under your name.&quot;</strong></td>
<td>Google E-E-A-T (Quality Rater Guidelines, 2023 <em>Helpful Content Update</em> now folded into core ranking) explicitly demotes ghost-written content without verifiable expert authorship. Vertical regulators penalise unsupported professional claims. The licensee carries the malpractice exposure for vendor-fabricated text.</td>
<td>Owner dictates (15-second voice memo or paragraph). Pipeline structures, schemas, and ships. Owner is the genuine author; pipeline is the typist. 3–5 dictated content shipments per month.</td>
</tr>
<tr>
<td><strong>&quot;X qualified leads per month, guaranteed.&quot;</strong></td>
<td>We don't control demand. Vendors who guarantee lead volumes either (a) define &quot;qualified&quot; so loosely that any form-fill counts, or (b) hit the number by buying paid ads on the licensee's dime. By the time the licensee notices, they've paid 6 months of retainer.</td>
<td>Structural conversion. We tell the licensee what their conversion was last month, where the drop-off is, and what experiment to run next. Demand-generation is a separate vendor relationship; we refer.</td>
</tr>
<tr>
<td><strong>&quot;Reputation management — we'll filter unhappy customers.&quot;</strong></td>
<td>Review-gating violates Google <em>Review Policies</em> (explicit prohibition), FTC <em>Endorsement Guides</em> (2024 final rule, monetary penalties), Canadian <em>Competition Act</em> §52 / §74.01 (Bureau enforcement), Yelp <em>Don't Ask for Reviews</em> (Consumer Alert badge), and every vertical regulator's advertising rules.</td>
<td>Honest review collection — neutral post-visit invite, no filtering. Typical lift: 3–6× monthly review volume in the first quarter, without any of the legal / platform-policy risk.</td>
</tr>
<tr>
<td><strong>&quot;All-in-one — your website, scheduling, EMR, CRM, in our platform.&quot;</strong></td>
<td>Becoming the EMR / case-management / PMS provider means becoming a HIPAA / PHIPA / PIPEDA / SOX / FINTRAC covered entity. We deliberately stay outside that scope. The walled-garden pattern is also the textbook vendor-lock-in play; we refuse to introduce that captivity.</td>
<td>Deep integration. Buttons / webhooks / deep-links into the licensee's existing EMR / case-mgmt / PMS / CRM. The licensee keeps their tool relationship; we keep ours.</td>
</tr>
<tr>
<td><strong>&quot;We'll run your Google Ads / Meta Ads on retainer.&quot;</strong></td>
<td>Different skill, different vendor incentives, structural conflict with a clean retainer (ratchets vs. fixed). Bundling ad-spend in a retainer creates an incentive to over-spend on ads (justify retainer) or under-spend (preserve margin); both serve the vendor, not the licensee.</td>
<td>Refer to a partner ads agency, non-revenue-share. Share landing-page conversion data; the agency runs the ad account; the licensee pays the agency directly.</td>
</tr>
<tr>
<td><strong>&quot;Buy backlinks / domain authority injection / link networks.&quot;</strong></td>
<td>Google spam policies (manual penalty risk), and a 6-month half-life on the result. We have seen ~30% of migrated sites carry residual penalty signal from a previous vendor.</td>
<td>None. We say no. The migration plan includes a Google Search Console audit for residual-penalty signals.</td>
</tr>
<tr>
<td><strong>&quot;Equity-only or revenue-share engagement.&quot;</strong></td>
<td>Operator economics distort under equity entanglement; the cash-retainer model is what aligns incentives cleanly. The &quot;if we go away&quot; exit test fails under equity.</td>
<td>Cash retainer. Clean exit on 30 days' notice. The licensee's domain, code, hosting, content stay with the licensee.</td>
</tr>
</tbody>
</table>
<p>The negative list is not scope shrinkage — it is a list of <em>what every competitor in your vertical will lie to you about, and what we are giving you a structural alternative to.</em> Prospects who hear it and feel relief are buyers. Prospects who hear it and feel withholding are not, and we don't want them.</p>
</section>

<h2 id="section-recap--differentiators">Section recap — Differentiators</h2>
<ul>
<li><strong>Phone-as-CMS</strong> is the headline feature. Nobody in our price band offers it.</li>
<li><strong>Multi-vendor fallback</strong> turns a single-vendor risk into a sold feature (&quot;we don't pause when one provider hiccups&quot;). Five legs deep on the deepest stage; any single provider can drop and the queue keeps moving.</li>
<li><strong>Dual-Lane Repo</strong> lets us license the system per engagement while the <em>site</em> is genuinely the client's.</li>
<li><strong>Tier cadence + watch tier</strong> turns &quot;how aggressive is the bot&quot; into a sold dial, plus a 24/7 watch loop on the operator side.</li>
<li><strong>Bot self-awareness</strong> (<code>llm-monitor</code>) closes the loop on upstream-provider quirks: the prompts learn from yesterday's bugs without an operator typing.</li>
<li><strong>The negative list</strong> (what we don't sell) is itself a differentiator — boundaries clients can read and trust.</li>
</ul>
<blockquote>
<p>Pitch line: <em>&quot;Other people sell you a website. We sell you a website that updates itself.&quot;</em></p>
</blockquote>
</section>

<h2 id="the-four-asks-we-hear-repeatedly">The four asks we hear repeatedly</h2>
<p>From discovery calls, Fiverr inquiries, and the freelance gig-profile work:</p>
<ol>
<li><strong>&quot;I want to update my own site without calling someone.&quot;</strong><br />
The Squarespace promise — but they want it on a real codebase they own.</li>
<li><strong>&quot;I don't want to pay $200 every time I fix a typo.&quot;</strong><br />
Predictable monthly cost beats lumpy invoices, even if the monthly is bigger.</li>
<li><strong>&quot;I want it to look custom, not like every other Wix site.&quot;</strong><br />
Custom palette, type, layout. Moodboard sign-off before any code.</li>
<li><strong>&quot;I want to own my site outright — no lock-in.&quot;</strong><br />
Their domain, their hosting, their code. Cancellable any time.</li>
</ol>
<p>Source: <code>docs/storefront/01-gig-profile.md</code> Parts 1, 6, and 8; <code>00-quick-start.md</code> &quot;Is this marketable?&quot;</p>

<h2 id="direct-quotes-we-plan-answers-around">Direct quotes we plan answers around</h2>
<blockquote>
<p><em>&quot;Can't I just use Squarespace?&quot;</em><br />
Yes — and a quarter of small businesses do. The difference is real ownership of the code + free unlimited edits + monthly improvements baked in.</p>
</blockquote>
<blockquote>
<p><em>&quot;Why pay monthly?&quot;</em><br />
Because every other dev charges per-edit and disappears between projects. Compare against $200 × 24 months of edits.</p>
</blockquote>
<blockquote>
<p><em>&quot;What if you go out of business?&quot;</em><br />
They keep the site. They keep the domain. They keep the hosting. They lose the autopilot. Already in the FAQ and the contract.</p>
</blockquote>
<blockquote>
<p><em>&quot;I'm worried about being locked in.&quot;</em><br />
They can't be. Code is theirs, domain is theirs, hosting is in their name.</p>
</blockquote>
<p>Source: <code>docs/storefront/00-quick-start.md</code> &quot;Is this marketable?&quot;; <code>04-slide-deck.md</code> honest-objections slide.</p>
</section>

<h2 id="the-hidden-ask-underneath">The hidden ask underneath</h2>
<p>What clients literally say is &quot;I want to update my own site.&quot; What they <em>mean</em>, almost always, is:</p>
<blockquote>
<p><em>&quot;I want to stop feeling stupid every time I open a CMS, and stop feeling guilty every time I delay a change because I don't want to email a developer about it.&quot;</em></p>
</blockquote>
<p>The product wins the moment that feeling goes away. Phone-shortcut + plain-English instruction + tap-to-publish is the shape of the answer because it solves the <em>feeling</em>, not just the technical task.</p>
<p>Source: synthesis from <code>docs/research/04-client-personas.md</code> and gig-profile pain-point map.</p>
</section>

<h2 id="section-recap--customer-voice">Section recap — Customer voice</h2>
<ul>
<li>Customers ask for <strong>autonomy</strong> (&quot;I want to fix it myself&quot;) and <strong>predictability</strong> (&quot;no surprise invoices&quot;).</li>
<li>They ask for <strong>ownership</strong> (&quot;no lock-in&quot;) and <strong>looks</strong> (&quot;not another Wix site&quot;).</li>
<li>The <strong>objections</strong> clump into four shapes (Squarespace, monthly cost, vendor risk, lock-in) — all four have prepared answers.</li>
<li>The ICP is solo consultants and boutique firms, not e-commerce or enterprise.</li>
<li>The hidden ask is emotional: stop feeling stupid, stop feeling guilty about delaying changes.</li>
</ul>
<blockquote>
<p>Pitch line: <em>&quot;Customers don't ask for AI. They ask to stop waiting on a developer.&quot;</em></p>
</blockquote>
</section>

<h2 id="competitor-pitch-matrix">Competitor pitch matrix</h2>
<table>
<thead>
<tr>
<th>Competitor</th>
<th>Verified pricing (2026-04-29)</th>
<th>What they tell SMBs</th>
<th>What they don't tell them</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Squarespace / Wix / Webflow</strong></td>
<td>$17 – $139 / mo (<code>[V] §B-Wix-Squarespace</code>)</td>
<td>&quot;Build a beautiful site in an afternoon, edit it yourself, no code.&quot;</td>
<td>The site lives in their walled garden. Export is painful. Performance and SEO ceilings. Plugin sprawl over time. 71% of consumers spot a DIY at first click (<code>[V] §B-Outdated-75</code>).</td>
</tr>
<tr>
<td><strong>Solo Upwork / Fiverr devs</strong></td>
<td>$1k – $5k upfront, then per-edit</td>
<td>&quot;Custom build, your code, your ownership, $1k–$5k.&quot;</td>
<td>After hand-off, every change is a custom invoice or a Slack message at 11pm. No ongoing improvement.</td>
</tr>
<tr>
<td><strong>Boutique agencies</strong></td>
<td>$6k – $12k upfront + $75 – $150/hr edits + $600 – $3,000/yr retainer (<code>[S] §B-Boutique-Agency</code>)</td>
<td>&quot;End-to-end design + build + monthly retainer for support.&quot;</td>
<td>Retainer pays for <em>availability</em>, not for actual edits. Each substantial change still bills $75–$150/hr.</td>
</tr>
<tr>
<td><strong>DesignJoy / Midday / Superside</strong></td>
<td>$4,995 / mo Standard, $7,995 / mo Pro, + $999 / mo Webflow add-on (<code>[V] §B-DesignJoy</code>)</td>
<td>&quot;Unlimited design requests, async Trello, 48h turnarounds.&quot;</td>
<td>Webflow-hosted. Designed for funded SaaS / enterprise marketing teams. ~10× our blended ARPU.</td>
</tr>
<tr>
<td><strong>WP Buffs maintenance</strong></td>
<td>$79 – $447 / mo across 5 tiers; &quot;Perform&quot; $219 / mo most popular (<code>[V] §B-WP-Buffs</code>)</td>
<td>&quot;24/7 monitoring, weekly core updates, basic edits, speed optimisation.&quot;</td>
<td>Locks the client onto the underlying decaying WordPress. Doesn't include the initial build.</td>
</tr>
<tr>
<td><strong>Headless CMS (Sanity / Contentful / Strapi) + dev</strong></td>
<td>$0 – $1,000 / mo CMS + dev hourly</td>
<td>&quot;Modern stack, structured content, scalable.&quot;</td>
<td>Client must learn a CMS. Still needs a developer for layout / component changes.</td>
</tr>
<tr>
<td><strong>AI-site generators (Framer AI, Durable, Bookmark)</strong></td>
<td>$20 – $100 / mo</td>
<td>&quot;Type a prompt, get a site.&quot;</td>
<td>Templated under the hood. Hosted in their stack. Phone-edit <em>publishing</em> is not the loop.</td>
</tr>
</tbody>
</table>
<p>We sit deliberately in the gap none of them serve: real-codebase ownership + AI-managed maintenance + flat fee.</p>

<h2 id="what-competitors-are-not-advertising-yet">What competitors are NOT advertising (yet)</h2>
<p>These are gaps in the market that, if a well-funded competitor closed, would compress our moat:</p>
<ul>
<li><strong>Phone-as-CMS over a real codebase.</strong> Not promoted by any major builder. Closest: Framer's mobile editor, but it's still inside Framer's stack.</li>
<li><strong>Multi-AI fallback as a sold feature.</strong> Most AI-site tools commit to one model; outage → queue stops.</li>
<li><strong>Plan-then-Execute with a human approval tap.</strong> Some Cursor / Devin-style products do &quot;AI proposes a PR&quot; but no flat-rate SMB packaging.</li>
<li><strong>Two-repo Dual-Lane Repo operator/client split.</strong> Genuinely uncommon — most operators commingle automation and site code, which makes hand-over messy.</li>
</ul>
<p>Watch list reassessed every 2 months: <strong>Framer</strong> (closest substitution risk if they add code-export + n8n), <strong>Vercel v0</strong> (if they package retainer), and any <strong>Anthropic-built &quot;ship a marketing site&quot; agent</strong>.</p>
</section>

<h2 id="section-recap--competitor-claims">Section recap — Competitor claims</h2>
<ul>
<li>Squarespace owns the <strong>edit-yourself</strong> narrative but loses on <strong>ownership + custom</strong>.</li>
<li>Freelancers and agencies own <strong>craft</strong> but lose on <strong>predictability + autonomy</strong>.</li>
<li>AI-site generators own the <strong>demo wow</strong> but lose on <strong>real ownership + flat-fee maintenance</strong>.</li>
<li>WordPress maintenance shops own <strong>monitoring</strong> but lock clients onto a decaying stack.</li>
<li>Nobody currently bundles ownership + autonomy + flat fee + custom craft. That's the wedge.</li>
</ul>
<blockquote>
<p>Pitch line: <em>&quot;Squarespace's edit loop, an agency's craft, and a freelancer's ownership — for one flat fee.&quot;</em></p>
</blockquote>
</section>

<h2 id="the-12-month-decision-rule">The 12-month decision rule</h2>
<blockquote>
<p>If a feature, doc, or tool helps the operator serve <strong>paid retainer clients</strong> better — build it.<br />
If it helps serve <strong>prospects, hypothetical SaaS users, or other agencies</strong> better — defer it.</p>
</blockquote>
<p>Source: <code>docs/mothership/01-business-plan.md §9</code>.</p>
<p>This rule is the antidote to over-engineering. Everything in this deck collapses to it.</p>
</section>

<h2 id="what-fully-grown-looks-like--stage-1">What &quot;fully grown&quot; looks like — Stage 1</h2>
<ul>
<li><strong>~25–30 active retainer clients.</strong> Mix: ~70% T2, ~20% T1, ~10% T3. (<code>docs/storefront/02-pricing-tiers.md</code>.)</li>
<li><strong>MRR ≈ CAD $6,000 – $9,200</strong> before setup-fee lumps. (<code>docs/storefront/03-cost-analysis.md</code> Part D.)</li>
<li><strong>Year-1 gross ~CAD $177k</strong>, take-home ~$118k–$128k after Ontario sole-prop tax.</li>
<li><strong>Operator hours: ≤175 / month</strong> of total work at saturation, of which ≤60 is client-facing.</li>
<li><strong>Day job replaced</strong> between months 9 and 12.</li>
<li><strong>Zero published incidents</strong> that would have cost a regulated client a compliance finding.</li>
</ul>
<p>This is the explicit target the cost analysis is built around. It's not &quot;first step toward a unicorn.&quot; It's the destination of Stage 1.</p>
<p>Source: <code>docs/storefront/03-cost-analysis.md</code> Parts B–D + <code>docs/mothership/18-capacity-and-unit-economics.md</code>.</p>
</section>

<h2 id="what-this-business-is-not-trying-to-become">What this business is <em>NOT</em> trying to become</h2>
<ul>
<li><strong>Not a venture-scale SaaS.</strong> No fundraising path. No &quot;10× growth&quot; hockey-stick.</li>
<li><strong>Not an agency.</strong> Hiring is deferred to Stage 2, not built into year-1 ops.</li>
<li><strong>Not a hosting company.</strong> Hosting is the client's, on their card.</li>
<li><strong>Not a labour arbitrage shop.</strong> No offshore team, no per-hour billing.</li>
<li><strong>Not a product company yet.</strong> No standalone software product is sold; the product is the <strong>service experience</strong>.</li>
</ul>
<p>The strategy is <em>deliberate smallness with high margin per client</em>, not scale at any cost.</p>
</section>

<h2 id="why-deliberate-smallness-is-the-strategy">Why deliberate smallness is the strategy</h2>
<p>Three forcing functions make 30 clients the right ceiling, not the consolation prize:</p>
<ol>
<li><strong>Margin holds because payroll doesn't.</strong> AI-enabled solo operators commonly report 65–75% gross margins (<code>[S] §B-Solopreneur-Margin</code>); traditional agencies compress to 40–50% under headcount load. We hold &gt;95% pre-comp because there is no payroll to client #35 (<code>docs/storefront/03-cost-analysis.md</code> Part E).</li>
<li><strong>Quality holds because attention does.</strong> Every client gets the same operator's eyes on every PR. Above 30, attention has to be split or delegated — which downgrades the product.</li>
<li><strong>Burnout is the ceiling, not the market.</strong> The operator's reach (~30 clients ≈ 0.0023% of Canadian SMBs) is decisively not bound by demand (<code>[V] §B-Canada-SMB</code>). The cap is a personal-sustainability gate, not a market gate.</li>
</ol>
</section>

<h2 id="section-recap--end-goal">Section recap — End goal</h2>
<ul>
<li><strong>Stage 1 destination: 30 retainer clients, ~$120k take-home, ≤175 op-hrs/mo.</strong></li>
<li><strong>Stage 2 destination:</strong> ~80 clients, 1–2 hires, ~24-month horizon — optional.</li>
<li><strong>Stage 3 destination:</strong> SaaS productisation — deferred until 30+ clients prove the model.</li>
<li><strong>The decision rule: paid retainers &gt; everything else.</strong></li>
<li>Smallness is a <strong>strategy</strong>, not a constraint.</li>
</ul>

<li><strong>Publish the storefront.</strong> Fiverr Gig 1, Upwork profile, Toptal/Arc/Lemon screening, LinkedIn case-study post. (<code>docs/storefront/01-gig-profile.md</code> Part 10.)</li>
<li><strong>Sell Client #2 + #3.</strong> Real arms-length retainers. Trigger MSA + payment automation + privacy work. (<code>docs/mothership/08-future-work.md §1–§3</code>.)</li>

</ol>
<p>Everything else can flex. These two cannot.</p>

<h2 id="strategic-risks-less-mitigated-watch-carefully">Strategic risks (less mitigated, watch carefully)</h2>
<ul>
<li><strong>Demand-side:</strong> the market may exist but our reach doesn't. Fix is more posting and outreach, not lower prices. (<code>docs/storefront/03-cost-analysis.md</code> Part G.)</li>
<li><strong>Competitive substitution:</strong> Framer, Vercel v0, or an Anthropic-built site agent could close the phone-as-CMS gap. Watch list maintained; reassess every 2 months.</li>
<li><strong>Regulatory:</strong> Quebec Law 25 is materially stricter than PIPEDA; needs a French-language privacy page if we sell in QC. Defer until first QC client.</li>
<li><strong>Model deprecation:</strong> a Claude / Gemini model retirement breaks pinned IDs. Mitigation: review pinned IDs every 2 months in <code>docs/AI_ROUTING.md</code>.</li>
<li><strong>Single bad client.</strong> &quot;One bad client costs more than ten good ones earn.&quot; Be ruthless with the say-no list.</li>
</ul>
</section>

<h2 id="failure-modes-specific-to-the-autopilot">Failure modes specific to the autopilot</h2>
<ol>
<li><strong>The bot makes a &quot;confident wrong&quot; change.</strong> Mitigation: every change waits for client tap; auto-merge limited to trivial labels; design / critical paths human-only.</li>
<li><strong>The plan-then-execute gate adds latency clients don't want.</strong> Mitigation: Tier 3 cadence runs hourly; Tier 0 explicitly opts out of automation entirely.</li>
<li><strong>The phone-edit shortcut breaks on iOS / Android update.</strong> Mitigation: web-based admin portal is the canonical surface; SMS + email are fallback channels.</li>
<li><strong>HMAC rotation goes wrong.</strong> Mitigation: two-phase HMAC rotation in <code>docs/mothership/03-secure-architecture §3.Y</code>; recovery drill in <code>03b-security-operations-checklist</code>.</li>
<li><strong>Cron drift between site and pipeline repos.</strong> Mitigation: Dual-Lane Repo puts cron only on the pipeline repo's <code>main</code> (canonical GitHub Actions path); enforced by <code>dual-lane-enforcement-checklist.md</code>.</li>
</ol>
</section>

<h2 id="the-single-biggest-existential-risk">The single biggest existential risk</h2>
<blockquote>
<p><strong>Operator burnout</strong> — not the market, not the technology, not a competitor.</p>
</blockquote>
<p>The cap (30 clients), the charter (80% / 95% session gates), the cadence (T0–T3), the negative list (no e-commerce, no white-label, no equity-only), and the planned hire ladder (VA at 25, engineer at 35) all exist for one purpose: keep the operator in the chair, healthy, with their evenings back, for the entire ramp.</p>
<p>If any <em>other</em> risk lands, the system absorbs it. If burnout lands, the system stops. Treat it accordingly.</p>
</section>

<h2 id="section-recap--challenges">Section recap — Challenges</h2>
<ul>
<li><strong>Operationally</strong> mitigated: outages, queue starvation, secret leaks, payment defaults, ADA — all have prepared playbooks.</li>
<li><strong>Strategically</strong> unsettled: demand reach, competitive moves, model deprecation, regulatory expansion.</li>
<li><strong>Capacity cliffs</strong> are scheduled, not surprises.</li>
<li><strong>Burnout is the single biggest existential risk.</strong> The cap, charter, and cadence exist to prevent it.</li>
</ul>
<blockquote>

<h2 id="tooling--the-operator-stack">Tooling — the operator stack</h2>
<ul>
<li><strong>Claude Pro/Max</strong> — primary AI; OAuth-bound to GitHub Actions via <code>CLAUDE_CODE_OAUTH_TOKEN</code>.</li>
<li><strong>Gemini API + OpenAI API + GitHub Models + OpenRouter</strong> — five-leg fallback ladder on the deepest stage (<code>codex-review</code>); shorter ladders on triage / plan / execute. All four fallback surfaces are free-tier-accessible, so the failover doesn't move the cost line meaningfully.</li>
<li><strong>n8n on Railway</strong> — capture and dispatch hub.</li>
<li><strong>GitHub</strong> — source of truth (Issues, Actions, Project v2).</li>
<li><strong>Vercel</strong> — hosting + preview builds + deploy hooks.</li>
<li><strong>Resend</strong> — magic-link emails.</li>
<li><strong>Twilio</strong> — per-client SMS numbers.</li>
<li><strong>Auth.js v5 + Octokit</strong> — admin portal stack.</li>
<li><strong>1Password + YubiKey</strong> — secrets vault.</li>
<li><strong>GitHub Pages SPA</strong> — operator dashboard (mobile-first).</li>
</ul>
<p>Most of this is already wired up on Client #1's site; the work is to <strong>separate</strong> it cleanly into pipeline + per-client repos under Dual-Lane Repo.</p>
</section>

<p>For partner-shaped contributions (revenue-share, co-operator), see <code>docs/decks/02-partner-deck.md</code>.</p>
