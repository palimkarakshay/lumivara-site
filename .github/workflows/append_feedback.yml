name: Append Feedback

on:
  repository_dispatch:
    types: [append_feedback]

permissions:
  contents: write

concurrency:
  group: feedback-write
  cancel-in-progress: false

jobs:
  append:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Append row to Inbox
        env:
          TEXT: ${{ github.event.client_payload.text }}
          TAGS: ${{ github.event.client_payload.tags }}
          SOURCE: ${{ github.event.client_payload.source }}
        run: |
          python3 <<'PY'
          import os, datetime, pathlib, re

          text = (os.environ.get("TEXT") or "").strip()
          tags = (os.environ.get("TAGS") or "").strip()
          source = (os.environ.get("SOURCE") or "Phone").strip()

          if not text:
              raise SystemExit("Empty payload text; refusing to append.")

          def esc(s: str) -> str:
              # escape pipes and collapse newlines so we stay inside one table cell
              return s.replace("\\", "\\\\").replace("|", "\\|").replace("\r", " ").replace("\n", " ").strip()

          date = datetime.date.today().isoformat()
          row = f"| {date} | {esc(source)} | {esc(text)} | {esc(tags)} | New |\n"

          path = pathlib.Path("Feedback.md")
          content = path.read_text(encoding="utf-8")

          marker = "## Inbox"
          if marker not in content:
              raise SystemExit("Could not find '## Inbox' section in Feedback.md")

          # Find the Inbox table header, then the first blank line after the header row.
          # We append the new row immediately before that blank line so it lands at the bottom of the Inbox table.
          inbox_start = content.index(marker)
          header_match = re.search(r"\|[^\n]*\|\n\|[-| ]+\|\n", content[inbox_start:])
          if not header_match:
              raise SystemExit("Inbox table header not found.")
          header_end = inbox_start + header_match.end()

          # Walk forward until we hit a line that isn't a table row (starts with '|').
          tail = content[header_end:]
          lines = tail.split("\n")
          insert_offset = 0
          for line in lines:
              if line.startswith("|"):
                  insert_offset += len(line) + 1  # +1 for the newline
              else:
                  break

          insert_at = header_end + insert_offset
          new_content = content[:insert_at] + row + content[insert_at:]
          path.write_text(new_content, encoding="utf-8")
          print(f"Appended: {row.strip()}")
          PY

      - name: Commit and push
        run: |
          git config user.name "feedback-bot"
          git config user.email "feedback-bot@users.noreply.github.com"
          git add Feedback.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "feedback(inbox): new item via phone"
          # Rebase on top of anything that landed while we were running, then push.
          git pull --rebase origin main
          git push origin HEAD:main
