<h2 id="the-product-in-one-sentence">The product, in one sentence</h2>
<blockquote>
<p><strong>Lumivara Forge</strong> designs and ships a modern marketing website for a small business, then keeps it improving on an automated subscription. The owner edits the site from a phone shortcut; an AI autopilot implements the change, opens a preview, and the owner taps publish. Beautiful build. <strong>No decay.</strong> Owned by the client; managed by us.</p>
</blockquote>
<br />
<p>Three things in one offer:</p>
<ol>
<li><strong>The site itself</strong> — custom, fast, accessible, owned by the client.</li>
<li><strong>The phone-edit system</strong> — change requests in 30 seconds, no developer call.</li>
<li><strong>The &quot;always-improving&quot; subscription</strong> — the site gets quietly better every month.</li>
</ol>
<p><span class="small">Source: <code>docs/mothership/01-business-plan.md §2</code>, <code>docs/storefront/01-gig-profile.md</code> Part 2.</span></p>

<p>A traditional agency build is &quot;delivered and forgotten.&quot; Within 12 months the site decays:</p>

<li>Every fix is a $150–$300 invoice and a 1–3 week wait.</li>
</ul>
<p>Lumivara Forge <strong>inverts</strong> that:</p>
<ul>
<li>The site <strong>gets better</strong> month over month — the operator ships 3–5 unprompted improvements per month on Tier 2 (loading speed, accessibility, SEO polish).</li>
<li>The client's <em>own</em> requested edits are unlimited within fair-use on Tier 2.</li>
<li>Total cost over 24 months is <strong>$7.5–$14k vs. $15–$30k+ for an agency.</strong></li>
</ul>
<p><span class="small">Source: <code>docs/storefront/02-pricing-tiers.md</code> Tier 2, <code>docs/storefront/04-slide-deck.md</code> &quot;What it costs … vs. an agency.&quot;</span></p>

<h2 id="the-differentiation-stack">The differentiation stack</h2>
<br />
<p>Six layers, from &quot;table stakes&quot; to &quot;uniquely ours&quot;:</p>
<ol>
<li><strong>Modern Next.js 16 site</strong> — most freelancers can do this. Table stakes.</li>
<li><strong>Phone-edit shortcut</strong> — submit a change from a phone in 30 seconds.</li>
<li><strong>AI autopilot that implements + previews changes</strong> — multi-vendor router (Claude → Gemini Pro → Gemini Flash → GitHub Models → OpenRouter on the deepest stage), plan-then-execute pipeline.</li>
<li><strong>Tier-based cadence + 24/7 watch tier</strong> — T1 ships next morning, T2 within 2 hours, T3 within 1 hour, plus an operator-side watch tier that sweeps every 15 min.</li>
<li><strong>Two-repo architecture (Dual-Lane Repo)</strong> — autopilot lives in an operator-only pipeline repo; the client's site repo is a clean Next.js codebase they own outright.</li>
<li><strong>Bot self-awareness pipeline</strong> — <code>llm-monitor</code> watches provider status + RSS + Stack Overflow, auto-rewrites <code>KNOWN_ISSUES.md</code> + <code>RECOMMENDATIONS.md</code>, and the runtime prompts ingest those files. The fleet learns from yesterday's bugs without an operator typing.</li>
</ol>
<blockquote>
<p>Layers 2–6 are what nobody else is shipping in this market segment.</p>
</blockquote>
<p><span class="small">Source: <code>docs/AI_ROUTING.md</code>, <code>docs/mothership/02b-dual-lane-architecture.md</code>, <code>docs/mothership/04-tier-based-agent-cadence.md</code>.</span></p>
</section>

<br />
<table>
<thead>
<tr>
<th>Layer</th>
<th>Concrete capability</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Phone-edit</strong></td>
<td>iOS/Android Shortcut → admin portal → n8n webhook → GitHub issue → bot. Auth.js v5 + magic-link, Google, or Entra ID.</td>
</tr>
<tr>
<td><strong>Multi-vendor router</strong></td>
<td>Claude Opus 4.7 primary; Gemini 2.5 Pro for 1M-context audits + planning; gpt-5.5 for code review with a five-leg fallback (Gemini Pro → Flash → GitHub Models → OpenRouter); free-tier-accessible all the way through. <strong>Outage in one provider doesn't pause the client's site.</strong></td>
</tr>
<tr>
<td><strong>Plan-then-execute</strong></td>
<td>Every routine issue gets a structured implementation plan first, <em>then</em> code. Plans are explainable to the operator before any code is written.</td>
</tr>
<tr>
<td><strong>Auto-merge gate</strong></td>
<td>Trivial/easy non-design PRs auto-merge once the Vercel preview check is green. Design and critical-path changes always wait for a human tap.</td>
</tr>
<tr>
<td><strong>Dual-Lane Repo</strong></td>
<td>Two private repos per client: <code>&lt;slug&gt;-site</code> (clean, client-readable, transferable) + <code>&lt;slug&gt;-pipeline</code> (operator-only, holds workflows + prompts + cron). The client cannot see the autopilot — at end of engagement they get a vanilla repo.</td>
</tr>
<tr>
<td><strong>Codex second-opinion</strong></td>
<td>T3 PRs are reviewed by gpt-5.5 before merge. Two opinions before anything ships.</td>
</tr>

<h2 id="why-competitors-cant-trivially-copy">Why competitors can't trivially copy</h2>
<br />
<ul>
<li><strong>n8n + multi-AI router + GitHub-App pattern is engineered, not configured.</strong> A solo freelancer would need 3–6 months of vibe-coding to replicate, by which time they're competing on the same terms — fine.</li>
<li><strong>Most agencies make money on per-edit billing.</strong> Killing that revenue stream is structurally hard for them; it's not a feature they'll add.</li>
<li><strong>Squarespace / Wix can't open-source-clone this.</strong> They're CMS platforms; the value here is &quot;you own the code AND it self-improves.&quot; Different shape entirely.</li>
<li><strong>The system itself is licensed per engagement</strong> — not work-for-hire. The client owns the <em>site</em>; we license the <em>system around it</em>. (See <code>docs/storefront/05-template-hardening-notes.md</code>.)</li>
</ul>
<blockquote>
<p>The moat is the <strong>operating system around the codebase</strong>, not the codebase. Nobody in this segment is selling that today.</p>
</blockquote>
<p><span class="small">Source: <code>docs/storefront/05-template-hardening-notes.md</code>, <code>docs/mothership/01-business-plan.md §6</code>.</span></p>
</section>

<h2 id="what-they-ask-for-decoded">What they ask for, decoded</h2>
<br />
<table>
<thead>
<tr>
<th>What they say</th>
<th>What they actually want</th>
</tr>
</thead>
<tbody>
<tr>
<td><em>&quot;I need a website.&quot;</em></td>
<td>A site that won't embarrass them in 18 months.</td>
</tr>
<tr>
<td><em>&quot;I just need a typo fix.&quot;</em></td>
<td>A relationship where typo fixes don't trigger a $200 invoice.</td>
</tr>
<tr>
<td><em>&quot;Can I edit it myself?&quot;</em></td>
<td>They want <strong>agency</strong> without <strong>complexity</strong>. They don't want to learn WordPress.</td>
</tr>
<tr>
<td><em>&quot;Make it pop.&quot;</em></td>
<td>They want their visitors to convert — they don't have the vocabulary for it.</td>
</tr>
<tr>
<td><em>&quot;I want it to rank on Google.&quot;</em></td>
<td>They want SEO maintenance, not a one-time SEO setup.</td>
</tr>
<tr>
<td><em>&quot;What if I want to leave?&quot;</em></td>
<td>They've been burned by lock-in before.</td>
</tr>
</tbody>
</table>
<blockquote>
<p>The phone-edit shortcut speaks directly to &quot;I want to edit it myself, but not learn anything new.&quot;<br />
The retainer speaks directly to &quot;no surprise invoices.&quot;<br />
Dual-Lane Repo handover speaks directly to &quot;I won't be locked in.&quot;</p>
</blockquote>

<h2 id="the-four-objections-we-hear-most">The four objections we hear most</h2>
<br />
<blockquote>
<p><strong>&quot;Can't I just use Squarespace?&quot;</strong><br />
<em>Yes — and a quarter of small businesses do. The difference is real ownership of the code + free unlimited edits + monthly improvements baked in.</em></p>
</blockquote>
<blockquote>
<p><strong>&quot;Why pay monthly?&quot;</strong><br />
<em>Because every other developer charges per-edit and disappears between projects. Over 24 months the retainer is cheaper, and the site is improving instead of decaying.</em></p>
</blockquote>
<blockquote>
<p><strong>&quot;What if you go out of business?&quot;</strong><br />
<em>Site keeps running. Domain, code, hosting are already in your name. The phone-edit pipeline stops; everything published stays published.</em></p>
</blockquote>
<blockquote>
<p><strong>&quot;I'm worried about being locked in.&quot;</strong><br />
<em>You can't be. Dual-Lane Repo means the autopilot is in our repo, not yours. Cancel any time; you keep a clean Next.js site.</em></p>
</blockquote>
<p><span class="small">Source: <code>docs/storefront/00-quick-start.md</code> &quot;Is this marketable?&quot;, <code>docs/storefront/04-slide-deck.md</code> objections slide.</span></p>
</section>

<h2 id="the-competitive-landscape">The competitive landscape</h2>
<br />
<table>
<thead>
<tr>
<th>Competitor type</th>
<th>What they pitch</th>
<th>What they actually deliver</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Squarespace / Wix / Webflow</strong></td>
<td>&quot;Beautiful sites you can edit yourself.&quot;</td>
<td>Templated builders. Owners learn a CMS, sites slow down, real ownership is shallow.</td>
</tr>
<tr>
<td><strong>Local agencies (5–20 person)</strong></td>
<td>&quot;Custom site, full service, dedicated PM.&quot;</td>
<td>High-quality build, but every post-launch edit is a billable hour. Site decays unless the client keeps paying for retainer-time.</td>
</tr>
<tr>
<td><strong>Upwork / Fiverr generalists</strong></td>
<td>&quot;Custom Next.js / WordPress site, fast turnaround.&quot;</td>
<td>Variable quality, no post-launch system, &quot;I'll fix it for $50&quot; relationship.</td>
</tr>
<tr>
<td><strong>Webflow Experts / Framer Pros</strong></td>
<td>&quot;Designer-built, no-code-friendly, modern.&quot;</td>
<td>Beautiful designs locked into a hosted platform. Owners pay platform fees + still need a designer for changes.</td>
</tr>
<tr>
<td><strong>AI website builders (Durable, Wix ADI, Framer AI)</strong></td>
<td>&quot;AI builds your site in 60 seconds.&quot;</td>
<td>One-shot generators. No edit-loop, no improvement subscription, no real ownership.</td>
</tr>
<tr>
<td><strong>DIY WordPress + plugins</strong></td>
<td>&quot;You own everything, edit anything.&quot;</td>
<td>True, and a maintenance nightmare. Plugin conflicts, security patches, expert needed monthly.</td>
</tr>
</tbody>
</table>
<p><span class="small">Source: <code>docs/storefront/01-gig-profile.md</code> Part 8, <code>docs/storefront/00-quick-start.md</code> market questions.</span></p>

<h2 id="what-they-dont-claim-and-why">What they don't claim (and why)</h2>
<br />
<p>No competitor in this segment is currently claiming <strong>all four</strong> of:</p>
<ol>
<li><em>Custom-coded</em> (not a template) — agencies claim it; builders can't.</li>
<li><em>Edit from a phone in 30 seconds</em> — nobody claims this credibly today.</li>
<li><em>Monthly improvement run baked into a flat fee</em> — agencies upsell it; nobody includes it.</li>
<li><em>Outage-resilient AI fallback ladder</em> — purely an engineering investment we've already made.</li>
</ol>
<br />
<blockquote>
<p>The composite offer — <em>all four together</em> — is the empty quadrant. That's where Lumivara Forge sits.</p>
</blockquote>
<p><span class="small">Source: <code>docs/AI_ROUTING.md</code> resilience section, <code>docs/mothership/01-business-plan.md §4</code> (feature matrix).</span></p>
</section>

<h2 id="the-why-hasnt-a-bigger-player-done-this-question">The &quot;why hasn't a bigger player done this?&quot; question</h2>
<br />
<p>Honest answer: because the economics only work for <strong>one operator running 25–30 retainers</strong> before it tips into hiring.</p>
<ul>
<li>A bigger player needs to load operator costs (PMs, account managers, designers) — that pushes price above $1,000/mo, killing the segment.</li>
<li>A solo developer without the autopilot can serve maybe 5 retainers before drowning in edit requests — too small to invest in the system.</li>
<li>The autopilot is the <strong>only</strong> thing that lets one person deliver agency-grade service to 25+ clients at sub-$300/mo.</li>
</ul>
<blockquote>
<p>The category is structurally hostile to anyone who isn't a senior engineer + one Claude Max subscription. That window is exactly the operator's profile.</p>
</blockquote>
<p><span class="small">Source: <code>docs/storefront/03-cost-analysis.md</code> Part E, <code>docs/mothership/18-capacity-and-unit-economics.md</code> cliffs.</span></p>
</section>

<h2 id="the-three-stage-business">The three-stage business</h2>
<br />
<table>
<thead>
<tr>
<th>Stage</th>
<th>Window</th>
<th>Shape</th>
<th>Ceiling</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Stage 1 — Services + retainer</strong></td>
<td>Now → month 24</td>
<td>One operator, 25–30 retainers, ~CAD $20k MRR</td>
<td>Operator hours</td>
</tr>
<tr>
<td><strong>Stage 2 — Managed-services agency</strong></td>
<td>Months 24–48</td>
<td>Operator + 1–2 hired engineers, ~80 retainers</td>
<td>Hiring + ops complexity</td>
</tr>
<tr>
<td><strong>Stage 3 — Productised SaaS</strong></td>
<td>Month 48+</td>
<td>Self-serve onboarding, customer-managed billing, founder-mode</td>
<td>Real PMF risk; uncapped</td>
</tr>
</tbody>
</table>
<br />
<blockquote>
<p><strong>The decision rule for the next 12 months:</strong><br />
If a feature, doc, or tool helps the operator serve <strong>paid retainer clients</strong> better — build it.<br />
If it helps <strong>prospects, hypothetical SaaS users, or other agencies</strong> — defer it.</p>
</blockquote>
<p><span class="small">Source: <code>docs/storefront/05-template-hardening-notes.md</code> &quot;Long-term&quot;, <code>docs/mothership/01-business-plan.md §9</code>.</span></p>
</section>

<h2 id="stage-1-success-metric">Stage-1 success metric</h2>
<br />
<p>By <strong>month 12</strong> of paid operations:</p>
<ul>
<li><strong>25–32 active retainer clients</strong>, mostly Tier 2.</li>
<li><strong>MRR ≈ CAD $8,500 – $10,000</strong> + lumpy setup-fee revenue.</li>
<li><strong>Year-1 net (before personal income tax) ≈ CAD $170k.</strong></li>
<li><strong>Take-home ≈ CAD $100–110k</strong> after Ontario sole-prop tax + the realistic 15% slow-month adjustment.</li>
<li>Day job replaced; runway &gt; 6 months personal expenses.</li>
</ul>
<p>By <strong>month 24</strong>:</p>
<ul>
<li>40+ retainers, second engineer hired, operator drops to ~30 hrs/week on the practice.</li>
<li>Still no SaaS, no self-serve. The system stays operator-mediated until the numbers force the change.</li>
</ul>
<p><span class="small">Source: <code>docs/storefront/03-cost-analysis.md</code> Part D (12-month spreadsheet), Part C (milestones).</span></p>
</section>

<h2 id="what-we-are-deliberately-not-building">What we are deliberately <em>not</em> building</h2>
<br />
<ul>
<li><strong>Not a SaaS.</strong> No public sign-up, no shared multi-tenant database, no marketing site funnel beyond <code>lumivara-forge.com</code>.</li>
<li><strong>Not an agency in the project-shop sense.</strong> No PMs, no design team, no in-house copywriters.</li>
<li><strong>Not a white-label reseller</strong> to other agencies (Tier 4 exists; we don't promote it).</li>
<li><strong>Not a hosting company.</strong> The client owns the Vercel account, the domain, the Resend (or equivalent) billing — by month 1.</li>
<li><strong>Not an enterprise vendor.</strong> No RFPs, no MSAs with procurement, no NDAs that take 6 weeks to negotiate.</li>
</ul>
<blockquote>
<p>Saying &quot;no&quot; to four of these every quarter is what keeps the operator's hours under 60 and the margins above 60%.</p>
</blockquote>
<p><span class="small">Source: <code>docs/mothership/01-business-plan.md §6</code>, <code>docs/storefront/01-gig-profile.md</code> Part 8.</span></p>
</section>

<h2 id="per-engagement-step-list-the-cli">Per-engagement step list (the CLI)</h2>
<br />
<p><code>npx forge provision --client-slug &lt;slug&gt; --tier &lt;n&gt;</code> runs <strong>13 idempotent steps</strong>:</p>
<ol>
<li>Validate slug + intake form completeness.</li>
<li>Create <code>&lt;slug&gt;-site</code> private repo.</li>
<li>Create <code>&lt;slug&gt;-pipeline</code> private repo.</li>
<li>Add both to org-secret scope.</li>
<li>Push <code>client-template/</code> (Next.js scaffold) to site repo's <code>main</code>.</li>
<li>Push <code>workflows-template/</code> + <code>scripts/</code> to pipeline repo's <code>main</code>.</li>
<li>Install GitHub App on the site repo; capture installation ID.</li>
<li>Provision Vercel project + env vars + deploy hook.</li>
<li>Provision n8n workflows (intake-web / email / sms, notify, record, deploy-confirmed).</li>
<li>Provision Twilio per-client number.</li>
<li>Bootstrap GitHub labels + Project board on site repo.</li>
<li>Smoke-test cross-repo write (App opens + closes a no-op PR).</li>
<li>Render handover pack from <code>07-client-handover-pack.md</code>.</li>
</ol>
<blockquote>
<p>Every step is individually testable. If one fails, the CLI prints what's done + what's left and the operator runs <code>--resume</code>.</p>
</blockquote>
<p><span class="small">Source: <code>docs/mothership/02-architecture.md §3</code>, <code>docs/mothership/18-provisioning-automation-matrix.md</code>.</span></p>
</section>

<h2 id="top-7-risk-register">Top-7 risk register</h2>
<br />
<table>
<thead>
<tr>
<th>Risk</th>
<th>Likelihood</th>
<th>Impact</th>
<th>Mitigation already built</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Anthropic outage / throttle</strong></td>
<td>Med</td>
<td>High</td>
<td>Five-leg multi-vendor fallback ladder (Claude → Gemini Pro → Gemini Flash → GitHub Models → OpenRouter); every stage has a primary + at least two fallbacks; triage + execute + review all survive Claude-down. <code>llm-monitor</code> ingests provider-status updates so the prompts know when a provider is degraded.</td>
</tr>
<tr>
<td><strong>Single client floods the queue</strong></td>
<td>Low</td>
<td>Med</td>
<td>Per-client <code>CONCURRENCY_CAP</code> Variable; tier cadence; &quot;noisy client&quot; rule defers work.</td>
</tr>
<tr>
<td><strong>Operator burnout</strong></td>
<td>Med</td>
<td>High</td>
<td>Hard cap of 30 retainers until VA hired; budget charter (50%/80% gates); cap weekly hours.</td>
</tr>
<tr>
<td><strong>Client demands the autopilot when they leave</strong></td>
<td>Low</td>
<td>Med</td>
<td>Contract: &quot;site = client; system = operator-licensed.&quot; Dual-Lane Repo makes this physically true — the autopilot was never on their repo.</td>
</tr>
<tr>
<td><strong>Secret leak (token in client repo)</strong></td>
<td>Low</td>
<td>Critical</td>
<td>Org-level secrets only; vendor GitHub App (no PAT); <code>.claudeignore</code>; <code>dual-lane-enforcement-checklist.md</code>.</td>
</tr>
<tr>
<td><strong>Bot ships breaking change to prod</strong></td>
<td>Low</td>
<td>High</td>
<td>Auto-merge gate is opt-in per label; design + critical paths excluded; Vercel preview always required; every change waits for client tap on T0/T1.</td>
</tr>
<tr>
<td><strong>Client refuses to pay</strong></td>
<td>Med</td>
<td>Med</td>
<td>Stripe auto-charge; pause autopilot at +14 days; full lockout at +30; site stays live (it's their domain).</td>
</tr>
</tbody>
</table>
<p><span class="small">Source: <code>docs/mothership/01-business-plan.md §8</code>, <code>docs/storefront/03-cost-analysis.md</code> Part F.</span></p>
</section>

<h2 id="strategic-risks-longer-horizon">Strategic risks (longer horizon)</h2>
<br />
<table>
<thead>
<tr>
<th>Risk</th>
<th>Why it matters</th>
<th>Where we'd respond</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>AI provider pricing shifts</strong> (Claude or Gemini becomes 3× more expensive)</td>
<td>Could compress margin from 70% to 40%.</td>
<td>Multi-provider router already swaps provider per task; raise prices at next tier-rev cycle.</td>
</tr>
<tr>
<td><strong>A model deprecation breaks the bot</strong></td>
<td>Workflows pin specific model IDs.</td>
<td><code>docs/AI_ROUTING.md</code> reviewed every 2 months; weekly <code>ai-smoke-test.yml</code>.</td>
</tr>
<tr>
<td><strong>A client's site has a security incident</strong></td>
<td>Reputation hit + possible PIPEDA notification.</td>
<td>Hard exclusions in the bot; Vercel handles the prod stack; carry pro-liability insurance once revenue &gt; $50k (~$400/yr).</td>
</tr>
<tr>
<td><strong>Quebec / EU client requires Law 25 / GDPR overlay</strong></td>
<td>Bot doesn't speak French; privacy posture isn't formal.</td>
<td>Geo expansion deferred until <code>08-future-work.md §1</code> is complete.</td>
</tr>
<tr>
<td><strong>A larger player (Webflow, Framer) ships an AI-edit feature</strong></td>
<td>Could compress the differentiation from 4 layers to 3.</td>
<td>Dual-Lane Repo ownership claim is structurally hard to copy without changing their business model.</td>
</tr>
<tr>
<td><strong>Solo-operator dependency</strong></td>
<td>Operator hospitalised → clients have no operator.</td>
<td>Break-glass envelope, successor protocol, vault redundancy (1Password Business + Bitwarden self-host). Trigger: client #5 OR MRR &gt; $3k.</td>
</tr>
</tbody>
</table>
<p><span class="small">Source: <code>docs/storefront/03-cost-analysis.md</code> Part F, <code>docs/mothership/08-future-work.md §4</code> (vault).</span></p>
</section>

<h2 id="the-is-this-even-worth-it-sanity-check">The &quot;is this even worth it?&quot; sanity check</h2>
<br />
<p>The doc asks the operator to run a <strong>4-week test before betting the practice on this</strong>:</p>
<ol>
<li>Post the Lumivara case study on LinkedIn with: <em>&quot;I built this. If you'd want one for your business, reply 'tell me more'.&quot;</em></li>
<li>DM 20 people in your network with the same one-paragraph pitch.</li>
<li>Run a single Fiverr Tier-2 gig for 4 weeks.</li>
</ol>
<p>By week 4, success looks like:</p>
<ul>
<li>≥ 3 inbound replies from LinkedIn</li>
<li>≥ 5 DM responses from your network</li>
<li>≥ 2 Fiverr inquiries</li>
</ul>
<blockquote>
<p>If you have those, the market exists. If you don't, the bottleneck is <strong>reach</strong>, not product — fix is more posting, not more features.</p>
</blockquote>
<p><span class="small">Source: <code>docs/storefront/03-cost-analysis.md</code> Part G.</span></p>
</section>

<h2 id="strategy-on-one-slide">Strategy on one slide</h2>
<br />
<table>
<thead>
<tr>
<th>Question</th>
<th>One-line answer</th>
</tr>

<tbody>
<tr>
<td><strong>Benefits for the customer</strong></td>
<td>A site that doesn't decay; phone-edits in 30s; flat fee; full ownership.</td>
</tr>
<tr>
<td><strong>What we provide that others don't</strong></td>
<td>Phone-edit + multi-AI autopilot + Dual-Lane Repo &quot;autopilot is hidden&quot; + monthly improvements baked in. Empty quadrant.</td>
</tr>
<tr>
<td><strong>What customers say they want</strong></td>
<td>Edit it themselves without learning anything; no surprise invoices; no lock-in.</td>
</tr>
<tr>
<td><strong>What competitors provide</strong></td>
<td>Templates (Squarespace), per-edit billing (agencies), one-shot AI (Durable). Nobody covers all four.</td>
</tr>
<tr>
<td><strong>End goal</strong></td>
<td>30 retainers @ ~$8.5–10k MRR, year-1 take-home ~$100–110k CAD; Stage-2 agency optional.</td>

</tr>
<tr>
<td><strong>Challenges</strong></td>
<td>AI provider risk, single-operator risk, lock-in perception. All seven mitigated in-flight.</td>
</tr>

<td><strong>Resources</strong></td>
