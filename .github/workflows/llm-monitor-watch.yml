name: LLM monitor — watch (every 15 min, outage detection)

# Pipeline-lane workflow. The fast tier of the tiered cadence
# introduced 2026-04-30: every 15 min, polls only the
# Statuspage.io provider feeds (Anthropic, OpenAI, Vercel, GitHub,
# Cloudflare, Hugging Face). When an incident is detected:
#
#   - the analyzer classifies it,
#   - KNOWN_ISSUES.md auto-section is rewritten,
#   - severity-≥4 outages get an auto-discovered GitHub issue,
#
# but the digest + operator/client newsletters are NOT regenerated
# — those are heavy text outputs that rotate daily, not every 15 min.
# The companion sweep tier (.github/workflows/llm-monitor.yml) still
# rewrites them every 2h.
#
# This is the "super aggressive" tier requested by the operator:
# outage notifications hit the bot's KNOWN_ISSUES feed within ~15 min
# instead of waiting up to 2h for the next sweep.
#
# Cross-references:
#   - scripts/llm-monitor/run.py            — `--mode=watch`
#   - scripts/llm-monitor/collectors/statuspages.py — sole collector
#   - scripts/llm-monitor/sources.json      — providers list
#   - .github/workflows/llm-monitor.yml     — sibling sweep tier
#   - docs/mothership/llm-monitor/runbook.md — operator runbook
#
# Why the 4,19,34,49 cron offset:
#   These four minute marks are clear of every existing repeating
#   slot in this repo:
#     :00 hour-cluster, :05/:25/:35/:55 forge-triage, :15/:45 plan +
#     deploy-drift + forge-triage, :17 codex-recheck, :23/:53
#     bot-usage, :30 deploy-drift + forge-execute, :37 backlog-digest,
#     :47 execute-complex.
#   Picking 4/19/34/49 keeps the watch tier 4 min off every neighbour
#   so two CI runners never queue head-to-head for the same hosted
#   image.
#
# Concurrency:
#   group "llm-monitor" is shared with the sweep workflow because
#   both write to the same KNOWN_ISSUES.md / RECOMMENDATIONS.md.
#   cancel-in-progress: false — we never abandon a watch run that
#   may have detected an outage just because the next 15-min slot
#   fired (that slot can wait 30s).

on:
  schedule:
    - cron: "4,19,34,49 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip Anthropic API + gh issue create (uses heuristic stub)"
        required: false
        default: "false"
      no_issues:
        description: "Update KNOWN_ISSUES but don't file GH issues"
        required: false
        default: "false"

permissions:
  contents: write   # rewrite KNOWN_ISSUES + RECOMMENDATIONS
  issues: write     # file auto-discovered outage issues

concurrency:
  group: llm-monitor
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore dedupe state
        uses: actions/cache@v4
        with:
          path: |
            scripts/llm-monitor/state/seen.json
            scripts/llm-monitor/state/raw
          key: llm-monitor-state-${{ github.run_id }}
          restore-keys: |
            llm-monitor-state-

      - name: Run llm-monitor (watch mode)
        env:
          # Same Anthropic → Gemini → OpenAI ladder as the sweep
          # workflow. The operator's realistic path is Gemini / OpenAI
          # since Claude runs on Max 20x OAuth, not raw API.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Mirrors the OPENAI_API_KEY_BACKUP fallback used in
          # plan-issues.yml + codex-review.yml.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY != '' && secrets.OPENAI_API_KEY || secrets.OPENAI_API_KEY_BACKUP }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          NO_ISSUES: ${{ github.event.inputs.no_issues || 'false' }}
        run: |
          set -euo pipefail
          ARGS=(--mode watch)
          if [ "$DRY_RUN" = "true" ]; then ARGS+=(--dry-run); fi
          if [ "$NO_ISSUES" = "true" ]; then ARGS+=(--no-issues); fi
          python3 scripts/llm-monitor/run.py "${ARGS[@]}"

      - name: Commit KNOWN_ISSUES + RECOMMENDATIONS updates (if any)
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Watch mode never touches digests/ or newsletters/ —
          # only KNOWN_ISSUES + RECOMMENDATIONS get rewritten.
          git add docs/mothership/llm-monitor/KNOWN_ISSUES.md \
                  docs/mothership/llm-monitor/RECOMMENDATIONS.md || true

          if git diff --staged --quiet; then
            echo "No KNOWN_ISSUES / RECOMMENDATIONS changes."
            exit 0
          fi

          NOW="$(date -u +%Y-%m-%dT%H:%MZ)"
          git commit -m "llm-monitor: watch tick ${NOW}" \
                     -m "Auto-generated by .github/workflows/llm-monitor-watch.yml. Triggered by a statuspages signal."
          # Pull-rebase before push so a concurrent sweep doesn't
          # cause us to fail with "non-fast-forward". The shared
          # concurrency group makes this rare but not impossible.
          git pull --rebase origin ${{ github.ref_name }} || true
          git push origin HEAD:${{ github.ref_name }}
