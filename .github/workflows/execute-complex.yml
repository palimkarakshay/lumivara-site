name: Execute backlog item — manual / complex

# Aggressive deploy-push phase: also fires on a 4-hour cron (offset :47)
# so `complexity/complex` + `auto-routine` + P1 items don't sit idle
# overnight waiting for the operator to dispatch manually. Per
# `docs/ops/automation-future-work.md §2.1`. The auto-pick step already
# handles "no eligible issue" gracefully (exits cleanly), so the cron
# is safe to fire even when the queue is empty.
#
# Concurrency group `claude-runtime` is shared with `execute.yml` →
# never races. If `execute.yml` is mid-run when the :47 tick arrives,
# this run waits in the queue.

on:
  schedule:
    # Every 4 hours at offset :47. Clear of every other watcher offset
    # (:00 hour-cluster, :15/:45 plan, :17 codex-recheck, :23/:53 bot-usage,
    # :30 deploy-drift, :37 backlog-digest). Six runs/day.
    - cron: "47 */4 * * *"
  workflow_dispatch:
    inputs:
      issue:
        description: "Issue number (leave blank to auto-pick top P1 manual-only)"
        required: false
        default: ""
      model_override:
        description: "Override model (leave blank to use the issue's model/* label)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "claude-haiku-4-5-20251001"
          - "claude-sonnet-4-6"
          - "claude-opus-4-7"

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: claude-runtime
  cancel-in-progress: false

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "claude-auto"
          git config user.email "claude-auto@users.noreply.github.com"

      - name: Pick eligible issue and model
        id: pick
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_ISSUE: ${{ inputs.issue }}
          INPUT_MODEL: ${{ inputs.model_override }}
        run: |
          # If user provided an issue number, fetch it directly. Else find top
          # P1 auto-routine + manual-only.
          if [ -n "$INPUT_ISSUE" ]; then
            gh issue view "$INPUT_ISSUE" --repo palimkarakshay/lumivara-site \
              --json number,title,labels > /tmp/single.json
            python3 - <<'PY'
          import json, os
          i = json.load(open('/tmp/single.json'))
          labels = {l['name'] for l in i['labels']}
          MODEL_FOR = {
              "model/haiku":  "claude-haiku-4-5-20251001",
              "model/sonnet": "claude-sonnet-4-6",
              "model/opus":   "claude-opus-4-7",
          }
          # Quality-first default: Opus when no explicit model/* label set.
          model = next((MODEL_FOR[l] for l in labels if l in MODEL_FOR), "claude-opus-4-7")
          override = os.environ.get("INPUT_MODEL", "").strip()
          if override:
              model = override
          out = open(os.environ["GITHUB_OUTPUT"], "a")
          out.write(f"issue={i['number']}\nmodel={model}\n")
          print(f"Manual run: working issue #{i['number']} with model {model}")
          PY
          else
            # Fetch manual-only issues AND all P1 auto-routine issues (P1 always
            # qualifies for manual/complex run regardless of manual-only flag).
            gh issue list --repo palimkarakshay/lumivara-site \
              --label auto-routine --state open \
              --json number,title,labels,createdAt --limit 100 > /tmp/candidates.json
            python3 - <<'PY'
          import json, os, sys
          issues = json.load(open('/tmp/candidates.json'))
          EXCLUDE = {"human-only", "status/blocked",
                     "status/in-progress", "status/needs-clarification",
                     "status/awaiting-review", "status/on-hold"}
          PRIO_RANK = {"priority/P1": 0, "priority/P2": 1, "priority/P3": 2}
          MODEL_FOR = {
              "model/haiku":  "claude-haiku-4-5-20251001",
              "model/sonnet": "claude-sonnet-4-6",
              "model/opus":   "claude-opus-4-7",
          }
          # Quality-first phase: every complexity tier defaults to Opus.
          MODEL_FROM_COMPLEXITY = {
              "complexity/trivial": "claude-opus-4-7",
              "complexity/easy":    "claude-opus-4-7",
              "complexity/medium":  "claude-opus-4-7",
              "complexity/complex": "claude-opus-4-7",
          }
          eligible = []
          for i in issues:
              labels = {l["name"] for l in i["labels"]}
              if labels & EXCLUDE: continue
              prio = min((PRIO_RANK.get(l, 99) for l in labels), default=99)
              if prio == 99: continue
              is_manual_only = "manual-only" in labels
              # Include: manual-only items (any priority) OR P1 items (any flag)
              if not (is_manual_only or prio == 0):
                  continue
              eligible.append((prio, i["createdAt"], i["number"], labels))
          out = open(os.environ["GITHUB_OUTPUT"], "a")
          if not eligible:
              out.write("issue=0\nmodel=\n")
              print("No eligible complex/P1 issues.")
              sys.exit(0)
          eligible.sort()
          _, _, num, labels = eligible[0]
          model = next((MODEL_FOR[l] for l in labels if l in MODEL_FOR), None)
          if not model:
              model = next((MODEL_FROM_COMPLEXITY[l] for l in labels if l in MODEL_FROM_COMPLEXITY), "claude-opus-4-7")
          override = os.environ.get("INPUT_MODEL", "").strip()
          if override:
              model = override
          out.write(f"issue={num}\nmodel={model}\n")
          print(f"Auto-pick: working issue #{num} with model {model}")
          PY
          fi

      - name: No eligible issue — exiting
        if: steps.pick.outputs.issue == '0'
        run: echo "No eligible complex/P1 issues. Exiting cleanly."

      - name: Export ISSUE_NUMBER to job env
        if: steps.pick.outputs.issue != '0'
        run: echo "ISSUE_NUMBER=${{ steps.pick.outputs.issue }}" >> "$GITHUB_ENV"

      # ── Phase 1: Opus plans ──────────────────────────────────────────────
      # Opus reads the issue, the codebase, and writes a detailed implementation
      # plan as a comment on the issue. Sonnet reads that plan in Phase 2.
      - name: "Phase 1 — Opus: write implementation plan"
        if: steps.pick.outputs.issue != '0'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          settings: |
            {
              "permissions": {
                "allow": ["Bash", "Read", "Glob", "Grep"]
              }
            }
          prompt: |
            You are the PLANNING agent for issue #${{ steps.pick.outputs.issue }}.
            Your only job is to produce a detailed implementation plan — no code changes.

            Steps:
            1. Fetch the issue: gh issue view ${{ steps.pick.outputs.issue }} --repo palimkarakshay/lumivara-site --json number,title,body,labels
            2. Read the relevant source files (src/, scripts/execute-prompt.md, AGENTS.md).
            3. Write a comment on the issue with a plan in this exact format:

            ## Implementation Plan (Opus)

            ### Files to create or modify
            - `path/to/file.ts` — what changes and why

            ### Step-by-step
            1. ...
            2. ...

            ### Risks / open questions
            - ...

            ### Definition of done
            - [ ] type-check passes
            - [ ] lint passes
            - [ ] ...

            Post the comment:
            gh issue comment ${{ steps.pick.outputs.issue }} --repo palimkarakshay/lumivara-site --body "$(cat /tmp/plan.md)"

            Save the plan to /tmp/plan.md before posting. Do NOT touch any source files.
            Do NOT open a branch. Do NOT open a PR.

            ## Surface your reasoning to the dashboard

            The AI Ops dashboard's LogViewer surfaces text wrapped in
            `>>> THINKING` / `<<< END THINKING` markers. Emit a thinking block
            via Bash at the major decision points (initial read of the issue,
            shape of the plan, risks you considered, definition-of-done):

            ```
            cat <<'EOT'
            >>> THINKING
            <one or more lines of reasoning>
            <<< END THINKING
            EOT
            ```

            Keep blocks tight; no full file contents, no secrets.
          claude_args: |
            --max-turns 150
            --model claude-opus-4-7

      # ── Phase 2: Opus implements ──────────────────────────────────────────
      # Quality-first phase: implementation runs on Opus too. Cost-optimisation
      # phase will revisit and likely move this back to Sonnet.
      - name: "Phase 2 — Opus: implement from plan"
        if: steps.pick.outputs.issue != '0'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash",
                  "Read",
                  "Write",
                  "Edit",
                  "Glob",
                  "Grep"
                ]
              }
            }
          prompt: |
            Issue #${{ steps.pick.outputs.issue }} has been pre-selected for you.
            ISSUE_NUMBER=${{ steps.pick.outputs.issue }} is available in your env.

            A planning comment was just posted on this issue by the Opus planning agent.
            Before starting, read that plan comment:
              gh issue view ${{ steps.pick.outputs.issue }} --repo palimkarakshay/lumivara-site --comments --json comments

            Find the comment that starts with "## Implementation Plan (Opus)" and follow it.
            Then read scripts/execute-prompt.md for the full execution protocol.
            Implement the issue. The gh CLI is authenticated. Node + dependencies installed.

            ## Surface your reasoning to the dashboard

            The AI Ops dashboard's LogViewer surfaces text wrapped in
            `>>> THINKING` / `<<< END THINKING` markers. Emit a thinking block
            via Bash at every meaningful decision point so the operator can
            follow what you're doing. Use a heredoc to keep multi-line content
            intact:

            ```
            cat <<'EOT'
            >>> THINKING
            <one or more lines of reasoning>
            <<< END THINKING
            EOT
            ```

            Print at minimum:
              1. One block at the start: how you read the plan and the issue.
              2. One before each significant action (branch creation, large
                 edit, type/lint run, PR open).
              3. One before exit summarising what you changed and why.
            Keep each block tight (a few short paragraphs). Do not include
            secrets, full file contents, or generated diffs inside a block.

            When done, print the summary and exit.
          claude_args: |
            --max-turns 500
            --model claude-opus-4-7
