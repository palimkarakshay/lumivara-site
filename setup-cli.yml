name: Setup AI CLIs
on:
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  install-and-trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Codex & Gemini
        run: |
          # Installs the latest versions via npm
          npm install -g @openai/codex @google/gemini-cli

      - name: Authenticate and Verify
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Authenticate Codex (OpenAI)
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "Error: OPENAI_API_KEY secret is missing."
            exit 1
          fi
          # Authenticate Gemini
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "Error: GEMINI_API_KEY secret is missing."
            exit 1
          fi

          # Verification and triggering logic
          codex --version
          gemini --version
          
          # Replace 'triage.yml' with your actual triage filename
          gh workflow run triage.yml
