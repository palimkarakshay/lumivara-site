name: Triage backlog

on:
  schedule:
    # Every 4 hours (00, 04, 08, 12, 16, 20 UTC). Cheap on Haiku.
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: claude-runtime
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash",
                  "Read",
                  "Grep",
                  "Glob"
                ]
              }
            }
          prompt: |
            Read the file `scripts/triage-prompt.md` in the checked-out repo and
            follow those instructions exactly. That file is the triage playbook —
            do not improvise beyond what it says. The `gh` CLI is available and
            already authenticated via GITHUB_TOKEN (check `gh auth status` if in
            doubt). When done, print the summary it asks for and exit.
          claude_args: |
            --max-turns 40
            --model claude-haiku-4-5-20251001
