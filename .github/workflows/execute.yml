name: Execute backlog item

on:
  schedule:
    # Every 4 hours — 6 runs/day. Cadence raised after AI-routing optimizations.
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  actions: write   # needed to dispatch sibling workflows for non-Claude routes

concurrency:
  group: claude-runtime
  cancel-in-progress: false

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "claude-auto"
          git config user.email "claude-auto@users.noreply.github.com"

      # ── Pick eligible issue + emit detailed routing audit ──────────────────
      # Uses scripts/lib/routing.py so triage / execute / smoke-test all agree
      # on the same rubric. Audit log goes to stdout AND $GITHUB_STEP_SUMMARY
      # so the operator can see *why* an issue went to a given model.
      - name: Pick eligible issue and route
        id: pick
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue list --repo palimkarakshay/lumivara-site \
            --label auto-routine --state open \
            --json number,title,labels,createdAt --limit 50 > /tmp/candidates.json

          python3 - <<'PY'
          import json, os, sys
          from pathlib import Path
          sys.path.insert(0, str(Path("scripts").resolve()))
          from lib.routing import decide

          issues = json.load(open('/tmp/candidates.json'))

          EXCLUDE = {"human-only", "manual-only", "status/blocked",
                     "status/in-progress", "status/needs-clarification",
                     "status/awaiting-review", "status/on-hold"}
          PRIO_RANK = {"priority/P1": 0, "priority/P2": 1, "priority/P3": 2}
          COMP_RANK = {"complexity/trivial": 0, "complexity/easy": 1, "complexity/medium": 2}

          eligible = []
          for i in issues:
              labels = {l["name"] for l in i["labels"]}
              if labels & EXCLUDE:
                  continue
              prio = min((PRIO_RANK.get(l, 99) for l in labels), default=99)
              comp = min((COMP_RANK.get(l, 99) for l in labels), default=99)
              if prio == 99 or comp == 99:
                  continue
              eligible.append((prio, comp, i["createdAt"], i["number"], i["title"], labels))

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          out = open(os.environ["GITHUB_OUTPUT"], "a")

          def emit(line: str):
              print(line)
              if summary_path:
                  with open(summary_path, "a") as fh:
                      fh.write(line + "\n")

          emit("## Execute — routing audit")
          emit(f"Scanned {len(issues)} candidate(s); {len(eligible)} eligible after filters.")

          if not eligible:
              out.write("issue=0\nworkflow=none\nmodel=\nprovider=\n")
              emit("No eligible issues this run. Exiting cleanly.")
              sys.exit(0)

          eligible.sort()
          _, _, _, num, title, labels = eligible[0]
          decision = decide(labels)

          emit(f"\nSelected issue #{num} — {title}")
          emit("```")
          emit(decision.audit())
          emit("```")

          # Code-edit workflows always run on Claude (Sonnet). Gemini and Codex
          # paths produce research / review artefacts, not code commits.
          # Cline is downgraded to Sonnet by the router itself.
          if decision.workflow == "claude":
              impl_model = "claude-sonnet-4-6"
              emit(
                  f"\n→ Implementation will run on {impl_model}. "
                  "(Haiku is for triage/identification only; Opus is reserved "
                  "for execute-complex.yml planning.)"
              )
              out.write(f"issue={num}\n")
              out.write(f"workflow=claude\n")
              out.write(f"provider={decision.provider}\n")
              out.write(f"model={impl_model}\n")
          elif decision.workflow == "gemini-research":
              emit(
                  f"\n→ Dispatching deep-research.yml for issue #{num} "
                  f"(Gemini {decision.model})."
              )
              out.write(f"issue={num}\n")
              out.write(f"workflow=gemini-research\n")
              out.write(f"provider={decision.provider}\n")
              out.write(f"model={decision.model}\n")
          elif decision.workflow == "codex-review":
              emit(
                  f"\n→ Dispatching codex-review.yml for issue #{num} "
                  f"(Codex {decision.model})."
              )
              out.write(f"issue={num}\n")
              out.write(f"workflow=codex-review\n")
              out.write(f"provider={decision.provider}\n")
              out.write(f"model={decision.model}\n")
          else:
              # Future-proof: unknown workflow -> exit cleanly so cron doesn't loop.
              emit(f"\n⚠️  Unknown workflow `{decision.workflow}` — skipping.")
              out.write("issue=0\nworkflow=none\nmodel=\nprovider=\n")
          PY

      - name: No eligible issue — exiting
        if: steps.pick.outputs.issue == '0'
        run: echo "No eligible issues this cron run. Exiting cleanly."

      # ── Dispatch non-Claude routes to their dedicated workflows ────────────
      # Keeps execute.yml's runtime stable and lets each provider's path own
      # its own permissions / CLI install / failure handling.
      - name: Dispatch deep-research.yml (Gemini Pro)
        if: steps.pick.outputs.workflow == 'gemini-research'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run deep-research.yml \
            --repo palimkarakshay/lumivara-site \
            -f issue=${{ steps.pick.outputs.issue }} \
            -f model=${{ steps.pick.outputs.model }}
          echo "Dispatched deep-research.yml for issue #${{ steps.pick.outputs.issue }}."

      - name: Dispatch codex-review.yml (OpenAI Codex)
        if: steps.pick.outputs.workflow == 'codex-review'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run codex-review.yml \
            --repo palimkarakshay/lumivara-site \
            -f issue=${{ steps.pick.outputs.issue }} \
            -f model=${{ steps.pick.outputs.model }}
          echo "Dispatched codex-review.yml for issue #${{ steps.pick.outputs.issue }}."

      # ── Claude path (default code implementation) ──────────────────────────
      - name: Export ISSUE_NUMBER to job env
        if: steps.pick.outputs.workflow == 'claude'
        run: echo "ISSUE_NUMBER=${{ steps.pick.outputs.issue }}" >> "$GITHUB_ENV"

      - uses: anthropics/claude-code-action@v1
        if: steps.pick.outputs.workflow == 'claude'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash",
                  "Read",
                  "Write",
                  "Edit",
                  "Glob",
                  "Grep"
                ]
              }
            }
          prompt: |
            Issue #${{ steps.pick.outputs.issue }} has been pre-selected for you
            by the multi-model router (provider=${{ steps.pick.outputs.provider }},
            model=${{ steps.pick.outputs.model }}). The full routing audit was
            printed in the previous step's log and step summary.
            ISSUE_NUMBER=${{ steps.pick.outputs.issue }} is available in your env.
            Read `scripts/execute-prompt.md` and follow it to implement that
            specific issue. Skip any issue-selection logic — it's already done.
            The `gh` CLI is authenticated. Node + dependencies are installed.
            When done, print the summary and exit.
          claude_args: |
            --max-turns 80
            --model ${{ steps.pick.outputs.model }}
