name: AI provider smoke test

# Verifies that each AI backend responds end-to-end. Runs weekly and on-demand.
# Results are printed to the run summary AND posted as a comment on issue #39
# (the rolling smoke-test tracking issue). If any provider fails, the job fails
# so GitHub notifies the operator.

on:
  schedule:
    - cron: '0 12 * * 1'   # Mondays 12:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Test Gemini API (REST)
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set +e
          python3 - <<'PY'
          import json, os, sys, urllib.request
          key = os.environ.get("GEMINI_API_KEY","").strip()
          if not key:
              print("::error::GEMINI_API_KEY not set")
              sys.exit(1)
          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={key}"
          req = urllib.request.Request(
              url,
              data=json.dumps({"contents":[{"parts":[{"text":"reply with the single word: pong"}]}]}).encode(),
              headers={"Content-Type":"application/json"},
              method="POST"
          )
          try:
              r = urllib.request.urlopen(req, timeout=20)
              text = json.loads(r.read())["candidates"][0]["content"]["parts"][0]["text"].strip()
              ok = "pong" in text.lower()
              print(f"Gemini 2.5 Flash: {'OK' if ok else 'UNEXPECTED'} — response: {text[:80]}")
              sys.exit(0 if ok else 1)
          except Exception as e:
              print(f"::error::Gemini failed: {e}")
              sys.exit(1)
          PY

      - name: Test OpenAI API (REST) — Codex/gpt-5-codex
        id: openai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set +e
          python3 - <<'PY'
          import json, os, sys, urllib.request
          key = os.environ.get("OPENAI_API_KEY","").strip()
          if not key:
              print("::error::OPENAI_API_KEY not set")
              sys.exit(1)
          req = urllib.request.Request(
              "https://api.openai.com/v1/chat/completions",
              data=json.dumps({
                  "model":"gpt-4o-mini",
                  "messages":[{"role":"user","content":"reply with the single word: pong"}],
                  "max_tokens":10
              }).encode(),
              headers={"Authorization":f"Bearer {key}","Content-Type":"application/json"},
              method="POST"
          )
          try:
              r = urllib.request.urlopen(req, timeout=20)
              text = json.loads(r.read())["choices"][0]["message"]["content"].strip()
              ok = "pong" in text.lower()
              print(f"OpenAI gpt-4o-mini: {'OK' if ok else 'UNEXPECTED'} — response: {text[:80]}")
              sys.exit(0 if ok else 1)
          except Exception as e:
              print(f"::error::OpenAI failed: {e}")
              sys.exit(1)
          PY

      - name: Test Claude Code OAuth (lightweight issue list)
        id: claude
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # We don't want to burn a full Claude turn just for a smoke test.
          # Instead, check that the secret is populated (length check — real
          # OAuth handshake happens every triage/execute run anyway).
          if [ -z "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN is empty"
            exit 1
          fi
          echo "Claude OAuth token: present (length $(echo -n '${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}' | wc -c))"

      - name: Summary
        if: always()
        run: |
          echo "### AI provider smoke test — $(date -u +%Y-%m-%d)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Provider | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gemini 2.5 Flash (REST) | ${{ steps.gemini.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| OpenAI gpt-4o-mini (REST) | ${{ steps.openai.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Claude Code OAuth token | ${{ steps.claude.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
