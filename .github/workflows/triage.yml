name: Triage backlog

on:
  schedule:
    # Every 30 minutes — bumped from hourly so new issues + clarifications
    # round-trip faster. Gemini + Codex fallbacks make the cost negligible.
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      engine:
        description: "Triage engine to start with (auto = Claude → Gemini → Codex ladder)"
        required: false
        default: "auto"
        type: choice
        options:
          - "auto"
          - "claude"
          - "gemini"
          - "codex"
  issues:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: triage-runtime
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # The engine selector decides which steps run. `auto` runs the full
      # ladder (Claude → Gemini → Codex) so triage NEVER fails because one
      # provider is down. Forced engines short-circuit to that single path.
      - name: Resolve engine
        id: engine
        run: |
          ENGINE="${{ inputs.engine || 'auto' }}"
          echo "engine=$ENGINE" >> "$GITHUB_OUTPUT"
          echo "Triage engine for this run: $ENGINE"

      # ── Claude Haiku (skipped if engine=gemini|codex) ──────────────────────
      - name: Claude Haiku triage
        id: claude_triage
        if: steps.engine.outputs.engine == 'auto' || steps.engine.outputs.engine == 'claude'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          settings: |
            {
              "permissions": {
                "allow": ["Bash", "Read", "Grep", "Glob"]
              }
            }
          prompt: |
            Read `scripts/triage-prompt.md` and follow it exactly. The `gh` CLI
            is authenticated. When done, print the summary.

            IMPORTANT: issues labeled `status/on-hold` are still eligible for
            classification and title/body reformatting, but do NOT remove the
            `status/on-hold` label and do NOT add `status/planned` — hold status
            means the operator deliberately parked the item. Add priority/
            complexity/area/type/model labels as usual so the hold item is
            navigable.
          claude_args: |
            --max-turns 40
            --model claude-haiku-4-5-20251001

      # ── Gemini Flash fallback (skipped if engine=claude|codex) ─────────────
      # Always runs in `auto` mode (not conditional on Claude failure). The
      # script itself exits early if no `status/needs-triage` items remain.
      - name: Gemini Flash triage fallback
        id: gemini_triage
        if: |
          always() && (
            steps.engine.outputs.engine == 'auto' ||
            steps.engine.outputs.engine == 'gemini'
          )
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/gemini-triage.py

      # ── Codex final fallback (skipped if engine=claude|gemini) ─────────────
      # Catches the case where Claude is rate-limited AND Gemini's free tier
      # is exhausted. Exits cleanly when OPENAI_API_KEY is missing so a repo
      # without OpenAI credits doesn't fail triage.
      - name: Codex (gpt-4o-mini) triage fallback
        id: codex_triage
        if: |
          always() && (
            steps.engine.outputs.engine == 'auto' ||
            steps.engine.outputs.engine == 'codex'
          )
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/codex-triage.py

      - name: Triage outcome summary
        if: always()
        run: |
          {
            echo "## Triage outcome — engine=${{ steps.engine.outputs.engine }}"
            echo ""
            echo "| Stage | Status |"
            echo "|-------|--------|"
            echo "| Claude Haiku | ${{ steps.claude_triage.outcome || 'skipped' }} |"
            echo "| Gemini Flash | ${{ steps.gemini_triage.outcome || 'skipped' }} |"
            echo "| Codex gpt-4o-mini | ${{ steps.codex_triage.outcome || 'skipped' }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Kick the planning stage so newly-triaged issues get a detailed plan ───
  # comment, regardless of which engine actually classified them. This is
  # what makes Claude-down execute fallback safe — the plan exists already.
  kick-planner:
    needs: triage
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch plan-issues.yml
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run plan-issues.yml \
            --repo palimkarakshay/lumivara-site || true
          echo "Dispatched plan-issues.yml (best-effort; errors ignored)."
