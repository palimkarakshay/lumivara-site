name: Triage backlog

on:
  schedule:
    # Every 4 hours (00, 04, 08, 12, 16, 20 UTC).
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: triage-runtime
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Attempt 1: Claude Haiku
      - name: Run Triage with Claude
        id: claude-triage
        continue-on-error: true # This allows Gemini to run if Claude fails/rate-limits
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          settings: |
            {
              "permissions": {
                "allow": ["Bash", "Read", "Grep", "Glob"]
              }
            }
          prompt: |
            Read the file `scripts/triage-prompt.md` in the checked-out repo and
            follow those instructions exactly. That file is the triage playbook —
            do not improvise beyond what it says. The `gh` CLI is available and
            already authenticated via GITHUB_TOKEN. When done, print the summary
            it asks for and exit.
          claude_args: |
            --max-turns 40
            --model claude-haiku-4-5-20251001

# Attempt 2: Gemini Fallback (Runs ONLY if Claude fails)
      - name: Run Triage with Gemini (Fallback)
        if: steps.claude-triage.outcome == 'failure'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_CLI_TRUST_WORKSPACE: true # Automatically trust the repo directory
        run: |
          # 1. Install the CLI
          npm install -g @google/gemini-cli
          
          # 2. Run using the -latest suffix to ensure compatibility with v1beta
          gemini run --model "gemini-1.5-flash-latest" --yolo <<EOF
          Read the file "scripts/triage-prompt.md" in the current directory and 
          follow those instructions exactly. That file is the triage playbook — 
          do not improvise beyond what it says. 
          
          The "gh" CLI is available and already authenticated via GITHUB_TOKEN.
          When done, print the summary it asks for and exit.
          EOF
