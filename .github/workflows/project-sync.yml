name: Sync issues to Project Kanban

# Moves issues between Project v2 columns automatically based on lifecycle events.
#
# Column map (must match your actual Project v2 Status field option names exactly):
#   Inbox        ← status/needs-triage (handled by Project's built-in "Auto-add" rule)
#   Triaged      ← status/planned label added to issue
#   In Progress  ← status/in-progress label added to issue
#   Review       ← auto-routine PR opened against the issue
#   Done         ← PR merged to main (Vercel auto-deploys from main; merge = production)
#
# One-time setup required:
#   1. Create a repo variable PROJECT_NUMBER (repo → Settings → Variables → Actions)
#      with the integer from your Project URL: github.com/users/.../projects/N
#   2. Make sure the Status field options in your Project are named exactly:
#      Inbox, Triaged, In Progress, Review, Done
#   3. Enable "Auto-add to project" in Project settings so new issues land in Inbox.

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read
  repository-projects: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
      REPO_OWNER: palimkarakshay
      REPO_NAME: lumivara-site

    steps:
      - name: Determine target column and issue number
        id: ctx
        run: |
          python3 - <<'PY'
          import json, os, re, subprocess, sys

          event = os.environ.get("GITHUB_EVENT_NAME", "")
          event_path = os.environ.get("GITHUB_EVENT_PATH", "")
          payload = json.load(open(event_path)) if event_path else {}

          issue_num = None
          column = None

          # ── issues: labeled ──────────────────────────────────────────────
          if event == "issues":
              label = payload.get("label", {}).get("name", "")
              issue_num = payload["issue"]["number"]
              if label == "status/planned":
                  column = "Triaged"
              elif label == "status/in-progress":
                  column = "In Progress"
              elif label == "status/awaiting-review":
                  column = "Review"
              # status/needs-triage → Inbox is handled by Project's built-in rule
              else:
                  print(f"Label '{label}' does not trigger a column move.")
                  sys.exit(0)

          # ── pull_request: opened ─────────────────────────────────────────
          elif event == "pull_request":
              action = payload.get("action")
              pr = payload["pull_request"]
              pr_labels = {l["name"] for l in pr.get("labels", [])}
              body = pr.get("body", "") or ""

              # Only care about auto-routine PRs
              if "auto-routine" not in pr_labels:
                  print("PR is not auto-routine — skipping.")
                  sys.exit(0)

              m = re.search(r"(?:Fixes|Closes|Resolves)\s+#(\d+)", body, re.IGNORECASE)
              if not m:
                  print("No linked issue in PR body — skipping.")
                  sys.exit(0)
              issue_num = int(m.group(1))

              if action == "opened":
                  column = "Review"
              elif action == "closed" and pr.get("merged"):
                  column = "Done"
              else:
                  print(f"PR action '{action}' / merged={pr.get('merged')} — no move.")
                  sys.exit(0)

          # ── deployment_status ────────────────────────────────────────────
          elif event == "deployment_status":
              ds = payload.get("deployment_status", {})
              state = ds.get("state", "")
              environment = ds.get("environment", "")

              if state != "success" or environment.lower() != "production":
                  print(f"Deploy state={state} env={environment} — no move.")
                  sys.exit(0)

              # Find the PR merged into main that triggered this deploy.
              # The deployment's sha lets us look up the associated PR.
              sha = payload.get("deployment", {}).get("sha", "")
              if not sha:
                  print("No SHA in deployment payload — skipping.")
                  sys.exit(0)

              owner = os.environ["REPO_OWNER"]
              repo  = os.environ["REPO_NAME"]
              result = subprocess.run(
                  ["gh", "api", f"/repos/{owner}/{repo}/commits/{sha}/pulls",
                   "--header", "Accept: application/vnd.github+json"],
                  capture_output=True, text=True
              )
              prs = json.loads(result.stdout) if result.returncode == 0 else []
              merged_pr = next((p for p in prs if p.get("merged_at")), None)
              if not merged_pr:
                  print("No merged PR for this deploy SHA — skipping.")
                  sys.exit(0)

              body = merged_pr.get("body", "") or ""
              m = re.search(r"(?:Fixes|Closes|Resolves)\s+#(\d+)", body, re.IGNORECASE)
              if not m:
                  print("Merged PR has no linked issue — skipping.")
                  sys.exit(0)
              issue_num = int(m.group(1))
              column = "Done"

          else:
              print(f"Unhandled event '{event}'.")
              sys.exit(0)

          out = open(os.environ["GITHUB_OUTPUT"], "a")
          out.write(f"issue_num={issue_num}\n")
          out.write(f"column={column}\n")
          print(f"Will move issue #{issue_num} → {column}")
          PY

      - name: Move issue to column in Project v2
        if: steps.ctx.outputs.issue_num != '' && steps.ctx.outputs.column != ''
        env:
          ISSUE_NUM: ${{ steps.ctx.outputs.issue_num }}
          TARGET_COLUMN: ${{ steps.ctx.outputs.column }}
        run: |
          python3 - <<'PY'
          import json, os, subprocess, sys

          owner   = os.environ["REPO_OWNER"]
          repo    = os.environ["REPO_NAME"]
          proj_n  = os.environ.get("PROJECT_NUMBER", "").strip()
          issue_n = os.environ["ISSUE_NUM"]
          target  = os.environ["TARGET_COLUMN"]

          if not proj_n or proj_n == "0":
              print("PROJECT_NUMBER not set — skipping. Set it in repo Settings → Variables → Actions.")
              sys.exit(0)

          def gql(query, variables=None):
              payload = {"query": query}
              if variables:
                  payload["variables"] = variables
              r = subprocess.run(
                  ["gh", "api", "graphql", "--input", "-"],
                  input=json.dumps(payload),
                  capture_output=True, text=True, check=True
              )
              return json.loads(r.stdout)

          def _issue_node_id(owner, repo, issue_n):
              d = gql("""
              query($owner: String!, $repo: String!, $issue: Int!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: $issue) { id }
                }
              }
              """, {"owner": owner, "repo": repo, "issue": int(issue_n)})
              return d["data"]["repository"]["issue"]["id"]

          # 1. Resolve project node ID + Status field ID + option IDs
          proj_data = gql("""
          query($login: String!, $number: Int!) {
            user(login: $login) {
              projectV2(number: $number) {
                id
                fields(first: 20) {
                  nodes {
                    ... on ProjectV2SingleSelectField {
                      id
                      name
                      options { id name }
                    }
                  }
                }
              }
            }
          }
          """, {"login": owner, "number": int(proj_n)})

          project = proj_data["data"]["user"]["projectV2"]
          project_id = project["id"]

          status_field = next(
              (f for f in project["fields"]["nodes"]
               if isinstance(f, dict) and f.get("name") == "Status"),
              None
          )
          if not status_field:
              print("Could not find 'Status' field in project — check field name.")
              sys.exit(1)

          field_id = status_field["id"]
          option = next(
              (o for o in status_field["options"] if o["name"] == target), None
          )
          if not option:
              available = [o["name"] for o in status_field["options"]]
              print(f"Column '{target}' not found. Available: {available}")
              sys.exit(1)
          option_id = option["id"]

          # 2. Find the Project item for this issue
          item_data = gql("""
          query($owner: String!, $repo: String!, $issue: Int!) {
            repository(owner: $owner, name: $repo) {
              issue(number: $issue) {
                projectItems(first: 10) {
                  nodes { id project { id } }
                }
              }
            }
          }
          """, {"owner": owner, "repo": repo, "issue": int(issue_n)})

          items = item_data["data"]["repository"]["issue"]["projectItems"]["nodes"]
          item = next((i for i in items if i["project"]["id"] == project_id), None)

          if not item:
              # Issue not in project yet — add it first, then move
              add_data = gql("""
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                  item { id }
                }
              }
              """, {"projectId": project_id, "contentId": _issue_node_id(owner, repo, issue_n)})
              item_id = add_data["data"]["addProjectV2ItemById"]["item"]["id"]
          else:
              item_id = item["id"]

          # 3. Update Status field
          gql("""
          mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
            updateProjectV2ItemFieldValue(input: {
              projectId: $projectId
              itemId: $itemId
              fieldId: $fieldId
              value: { singleSelectOptionId: $optionId }
            }) {
              projectV2Item { id }
            }
          }
          """, {
              "projectId": project_id,
              "itemId": item_id,
              "fieldId": field_id,
              "optionId": option_id,
          })

          print(f"Moved issue #{issue_n} to '{target}' in project.")
          PY
