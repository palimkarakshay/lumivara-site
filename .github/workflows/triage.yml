name: Triage backlog

on:
  schedule:
    # Every hour. Gemini fallback makes this cheap.
    - cron: '0 * * * *'
  workflow_dispatch:
  issues:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  # Separate group from execute so triage + execute can run concurrently.
  group: triage-runtime
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Primary: Claude Haiku ──────────────────────────────────────────
      - name: Claude Haiku triage
        id: claude_triage
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          settings: |
            {
              "permissions": {
                "allow": ["Bash", "Read", "Grep", "Glob"]
              }
            }
          prompt: |
            Read `scripts/triage-prompt.md` and follow it exactly. The `gh` CLI
            is authenticated. When done, print the summary.

            IMPORTANT: issues labeled `status/on-hold` are still eligible for
            classification and title/body reformatting, but do NOT remove the
            `status/on-hold` label and do NOT add `status/planned` — hold status
            means the operator deliberately parked the item. Add priority/
            complexity/area/type/model labels as usual so the hold item is
            navigable.
          claude_args: |
            --max-turns 40
            --model claude-haiku-4-5-20251001

      # ── Fallback: Gemini 2.5 Flash (REST API) ───────────────────────────
      # Runs always (not conditional on Claude failure). The script itself
      # exits early if no `status/needs-triage` items remain. This covers:
      # (a) Claude hit quota mid-run and missed items, (b) Claude errored
      # entirely, (c) issues arrived between Claude's scan and now.
      # Uses REST API instead of gemini-cli to avoid non-interactive quirks.
      - name: Gemini Flash triage fallback
        if: always()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/gemini-triage.py
