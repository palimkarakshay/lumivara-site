name: LLM monitor (daily digest + KNOWN_ISSUES refresh)

# Pipeline-lane workflow. Reads HN / RSS / Reddit / GitHub for new
# bugs, features, and best-practices about the LLMs and SDKs this
# operator pipeline depends on, then writes:
#
#   - docs/mothership/llm-monitor/digests/YYYY-MM-DD.md
#   - docs/mothership/llm-monitor/KNOWN_ISSUES.md (auto-section)
#   - GitHub issues labelled `auto-discovered` + `infra-allowed` for
#     severity-≥4 bugs with a clear action_hint
#
# The triage / plan / execute prompts ingest KNOWN_ISSUES.md so
# every bot run starts from the last 14 days of field reports
# instead of frozen training data — that's the "self-awareness" loop.
#
# Cross-references:
#   - scripts/llm-monitor/README.md       — architecture, source list
#   - scripts/llm-monitor/run.py          — entrypoint
#   - scripts/llm-monitor/sources.json    — feeds, subreddits, repos
#   - docs/mothership/llm-monitor/runbook.md — operator runbook
#   - .github/workflows/backlog-digest.yml — sibling daily-style cron
#     this mirrors in style
#
# Why daily at 06:13 UTC (not every-2h like backlog-digest):
#   - The signal sources move on the order of days, not hours. A
#     more-than-daily cadence churns the digest without surfacing
#     new info.
#   - 06:00 UTC = 23:00 PT = 02:00 ET — an operator opening the
#     phone in the morning gets a fresh digest from the current day.
#   - :13 offset is clear of every other watcher slot (:00 cluster,
#     :15/:45 plan, :17 codex-recheck, :23/:53 bot-usage, :37 backlog,
#     :47 execute-complex, :05/:15/:25/:35/:45/:55 forge-triage).

on:
  schedule:
    - cron: "13 6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip Anthropic API + gh issue create (uses heuristic stub)"
        required: false
        default: "false"
      no_issues:
        description: "Update digest + KNOWN_ISSUES but don't file GH issues"
        required: false
        default: "false"
      collectors:
        description: "Comma-separated subset (default: hackernews,rss,reddit,github)"
        required: false
        default: "hackernews,rss,reddit,github"

permissions:
  contents: write   # commit digest + KNOWN_ISSUES
  issues: write     # file auto-discovered issues

concurrency:
  group: llm-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Restore the dedupe set + raw archive from the previous run.
      # If the artifact has aged out (90 days), we accept a one-day
      # duplicate-digest cost rather than carry a heavier store.
      - name: Restore dedupe state
        uses: actions/cache@v4
        with:
          path: |
            scripts/llm-monitor/state/seen.json
            scripts/llm-monitor/state/raw
          key: llm-monitor-state-${{ github.run_id }}
          restore-keys: |
            llm-monitor-state-

      - name: Run llm-monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REPO: ${{ github.repository }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          NO_ISSUES: ${{ github.event.inputs.no_issues || 'false' }}
          COLLECTORS: ${{ github.event.inputs.collectors || 'hackernews,rss,reddit,github' }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ "$DRY_RUN" = "true" ]; then ARGS+=(--dry-run); fi
          if [ "$NO_ISSUES" = "true" ]; then ARGS+=(--no-issues); fi
          ARGS+=(--collectors "$COLLECTORS")
          python3 scripts/llm-monitor/run.py "${ARGS[@]}"

      - name: Commit digest + KNOWN_ISSUES updates
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage only the artifacts the pipeline owns. state/ is
          # gitignored so it never leaks.
          git add docs/mothership/llm-monitor/digests/ \
                  docs/mothership/llm-monitor/newsletters/ \
                  docs/mothership/llm-monitor/KNOWN_ISSUES.md \
                  docs/mothership/llm-monitor/RECOMMENDATIONS.md || true

          if git diff --staged --quiet; then
            echo "No digest / KNOWN_ISSUES changes to commit."
            exit 0
          fi

          DATE="$(date -u +%Y-%m-%d)"
          git commit -m "llm-monitor: digest ${DATE}" \
                     -m "Auto-generated by .github/workflows/llm-monitor.yml. Do not hand-edit; edit upstream config in scripts/llm-monitor/sources.json."
          git push origin HEAD:${{ github.ref_name }}
