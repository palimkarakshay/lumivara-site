name: Codex review (OpenAI gpt-5.5)

# Runs OpenAI gpt-5.5 (ChatGPT Plus tier) on issues OR pull requests for code
# review / diff analysis. Posts the review as a comment on the issue (and on
# the linked PR, if any). No code commits.
#
# Triggered three ways:
#   1. `pull_request` (opened, reopened, synchronize, ready_for_review) —
#      every new PR gets a Codex consistency review automatically. The
#      review is posted as a PR comment and labels the PR
#      `codex-reviewed`. If Codex flags blocker/major findings, the PR is
#      additionally labeled `codex-blockers` so auto-merge.yml gates the
#      merge until the findings are addressed.
#   2. `workflow_dispatch` — operator-invoked review on a specific issue.
#   3. Indirect dispatch by `execute.yml` when an issue carries
#      `model/codex` (the router path).
#
# OPENAI_API_KEY is OPTIONAL on this repo — if missing or quota-exhausted,
# the workflow exits cleanly with a warning. For dispatch-on-issue runs it
# also re-labels the issue back to the Claude path so the work isn't lost.

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:
    inputs:
      issue:
        description: "Issue number (omit if dispatching for a PR)"
        required: false
      pr:
        description: "PR number to re-review (used by codex-review-recheck.yml)"
        required: false
      model:
        description: "OpenAI model id (default gpt-5.5)"
        required: false
        default: "gpt-5.5"

permissions:
  contents: read
  issues: write
  pull-requests: write
  # Needed by the GitHub Models leg in scripts/codex-review-fallback.py.
  # GITHUB_TOKEN cannot call https://models.github.ai/inference without
  # this scope — without it the leg returns auth-error and falls through
  # to OpenRouter / defer.
  models: read

concurrency:
  group: codex-review-runtime
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      # ── Resolve target ────────────────────────────────────────────────────
      # The workflow runs in three modes:
      #   - mode=pr     → triggered by `pull_request`, OR by
      #                   `workflow_dispatch` with `pr=N` (recheck cron).
      #                   Review the PR diff directly.
      #   - mode=issue  → triggered by `workflow_dispatch` with `issue=N`;
      #                   review an issue (and any PR it references).
      # All later steps key off `steps.target.outputs.mode`.
      - name: Resolve target (PR vs issue)
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_ISSUE: ${{ inputs.issue }}
          INPUT_PR: ${{ inputs.pr }}
          INPUT_MODEL: ${{ inputs.model }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          MODEL="${INPUT_MODEL:-gpt-5.5}"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "mode=pr" >> "$GITHUB_OUTPUT"
            echo "pr=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "issue=" >> "$GITHUB_OUTPUT"
            echo "model=$MODEL" >> "$GITHUB_OUTPUT"
            echo "Resolved target: PR #$PR_NUMBER (model=$MODEL)"
          elif [ -n "$INPUT_PR" ]; then
            echo "mode=pr" >> "$GITHUB_OUTPUT"
            echo "pr=$INPUT_PR" >> "$GITHUB_OUTPUT"
            echo "issue=" >> "$GITHUB_OUTPUT"
            echo "model=$MODEL" >> "$GITHUB_OUTPUT"
            echo "Resolved target: PR #$INPUT_PR (workflow_dispatch, model=$MODEL)"
          elif [ -n "$INPUT_ISSUE" ]; then
            echo "mode=issue" >> "$GITHUB_OUTPUT"
            echo "pr=" >> "$GITHUB_OUTPUT"
            echo "issue=$INPUT_ISSUE" >> "$GITHUB_OUTPUT"
            echo "model=$MODEL" >> "$GITHUB_OUTPUT"
            echo "Resolved target: issue #$INPUT_ISSUE (model=$MODEL)"
          else
            echo "::error::workflow_dispatch needs either \`issue\` or \`pr\` input."
            exit 1
          fi

      # The review pass walks a five-leg provider ladder:
      #   OPENAI_API_KEY → OPENAI_API_KEY_BACKUP → Gemini Pro → Gemini
      #   Flash → GitHub Models (Llama-3.3-70b → gpt-4.1-mini) →
      #   OpenRouter (DeepSeek R1 → Qwen3 Coder) → defer
      # so a 429 / outage on any single leg no longer silently skips
      # the consistency check. We only short-circuit (defer immediately)
      # when EVERY OpenAI / Gemini / OpenRouter key is missing — GitHub
      # Models uses the auto-provisioned GITHUB_TOKEN and is therefore
      # always available, but it shares a rate-limit pool with all
      # GitHub Actions traffic so we don't hard-rely on it as the sole
      # review path.
      - name: Verify review-engine availability
        id: verify
        env:
          # Pass all keys through. codex-review-fallback.py walks the
          # ladder; on this repo OPENAI_API_KEY is the free-tier ChatGPT
          # account and OPENAI_API_KEY_BACKUP is the paid account, so a
          # 429 on the free key falls through to paid (and the bill only
          # grows on overflow).
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_KEY_BACKUP: ${{ secrets.OPENAI_API_KEY_BACKUP }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          MODE: ${{ steps.target.outputs.mode }}
          ISSUE: ${{ steps.target.outputs.issue }}
          PR: ${{ steps.target.outputs.pr }}
        run: |
          # GitHub Models uses GITHUB_TOKEN which is always present in
          # GitHub Actions, so for PR mode there is no longer a "no
          # review possible" case — the script will at minimum attempt
          # the GitHub Models leg, and a deferred review is recovered
          # by the codex-review-recheck.yml cron.
          #
          # Issue mode is different. An issue dispatched here via
          # `model/codex` from execute.yml will be moved to
          # `status/awaiting-review` once a review comment is posted,
          # and execute.yml excludes that status from future picks. So
          # if every leg defers (e.g. all operator keys missing AND
          # GitHub Models org-disabled / scope denied / outage), the
          # issue stalls indefinitely — there is no recheck cron for
          # deferred ISSUES. Restore the original safety net for that
          # case: when no operator key is configured, immediately
          # remove `model/codex` so the next execute run picks the
          # issue up on the Claude path. (Codex P1 finding on PR #244,
          # 2026-04-30.)
          if [ "$MODE" = "issue" ] \
             && [ -z "$OPENAI_API_KEY" ] && [ -z "$OPENAI_API_KEY_BACKUP" ] \
             && [ -z "$GEMINI_API_KEY" ] && [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::warning::Issue-mode review with no operator keys — rerouting back to Claude (avoids status/awaiting-review stall if GitHub Models also fails)."
            if [ -n "$ISSUE" ]; then
              gh issue comment "$ISSUE" \
                --repo palimkarakshay/lumivara-site \
                --body "Codex review requested but no OpenAI / Gemini / OpenRouter key is configured. Removing \`model/codex\` so the next execute run picks this up via Claude — keeps the issue out of the \`status/awaiting-review\` dead-letter state in case GitHub Models is also unreachable."
              gh issue edit "$ISSUE" \
                --repo palimkarakshay/lumivara-site \
                --remove-label "model/codex" || true
            fi
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # PR-mode all-keys-missing case: just log; the recheck cron
          # plus the `review-deferred` label trail will recover any
          # deferred PR review.
          if [ -z "$OPENAI_API_KEY" ] && [ -z "$OPENAI_API_KEY_BACKUP" ] \
             && [ -z "$GEMINI_API_KEY" ] && [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::warning::No operator-provided review keys set (OPENAI / GEMINI / OPENROUTER all missing). Falling through to GitHub Models leg only."
          fi
          # Codex CLI is only required for the OpenAI leg; absent that key
          # we still continue with the rest of the ladder, so a missing
          # CLI is non-fatal.
          codex --version || true
          echo "ok=true" >> "$GITHUB_OUTPUT"

      - name: Run code review pass (OpenAI → backup → Gemini Pro → Flash → GitHub Models → OpenRouter → defer)
        if: steps.verify.outputs.ok == 'true'
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_KEY_BACKUP: ${{ secrets.OPENAI_API_KEY_BACKUP }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # GITHUB_TOKEN is read by the script for both gh CLI calls
          # and the GitHub Models leg of the fallback ladder.
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          MODE: ${{ steps.target.outputs.mode }}
          ISSUE: ${{ steps.target.outputs.issue }}
          PR_INPUT: ${{ steps.target.outputs.pr }}
          MODEL: ${{ steps.target.outputs.model }}
        run: |
          set -euo pipefail
          REPO=palimkarakshay/lumivara-site

          # ── Gather diff + context, regardless of mode ─────────────────────
          if [ "$MODE" = "pr" ]; then
            PR_NUM="$PR_INPUT"
            gh pr view "$PR_NUM" --repo "$REPO" \
              --json number,title,body,labels > /tmp/pr.json
            TITLE=$(python3 -c 'import json; print(json.load(open("/tmp/pr.json"))["title"])')
            BODY=$(python3 -c 'import json; print(json.load(open("/tmp/pr.json")).get("body") or "(empty)")')
            ISSUE_REF=""
          else
            gh issue view "$ISSUE" --repo "$REPO" \
              --json number,title,body,labels > /tmp/issue.json
            TITLE=$(python3 -c 'import json; print(json.load(open("/tmp/issue.json"))["title"])')
            BODY=$(python3 -c 'import json; print(json.load(open("/tmp/issue.json")).get("body") or "(empty)")')
            PR_NUM=$(python3 - <<'PY'
          import json, re
          body = json.load(open("/tmp/issue.json")).get("body") or ""
          m = re.search(r"PR\s*#?(\d+)", body, re.IGNORECASE)
          print(m.group(1) if m else "")
          PY
          )
            ISSUE_REF="$ISSUE"
          fi

          DIFF=""
          if [ -n "$PR_NUM" ]; then
            echo "Fetching diff for PR #$PR_NUM."
            gh pr diff "$PR_NUM" --repo "$REPO" 2>/dev/null \
              | head -c 60000 > /tmp/diff.txt || true
            DIFF=$(cat /tmp/diff.txt)
          fi

          # ── Build prompt (engine-agnostic; required structure lives here) ──
          # Keep it structured so apply-codex-fixes.yml can reliably find
          # blocker/major findings and propose code-level fixes for them,
          # regardless of which engine produced the review.
          export MODE TITLE BODY DIFF MODEL PR_NUM ISSUE_REF
          python3 - <<'PY' > /tmp/prompt.txt
          import os
          mode = os.environ["MODE"]
          parts = [
              "You are the Codex consistency reviewer for the Lumivara site",
              "repo. Read the change below and produce a focused review",
              "with two goals (in order):",
              "",
              "1. Consistency with project conventions (AGENTS.md, AI_ROUTING.md,",
              "   docs/ structure, label scheme, file layout, naming, the model",
              "   routing rubric in scripts/lib/routing.py).",
              "2. Code correctness, security, accessibility, and performance.",
              "",
              "Format requirements (the downstream auto-fixer parses this):",
              "- Use these exact section headers, in this order:",
              "  `## Consistency findings`, `## Correctness findings`,",
              "  `## Suggested fixes`, `## Verdict`.",
              "- Under each findings section, list items as:",
              "  `- [severity] path/to/file.ext:LN — description`",
              "  where severity ∈ {blocker, major, minor, nit}.",
              "- `## Suggested fixes` lists concrete, mechanical edits a bot",
              "  could apply (one per finding when possible). Each item:",
              "  `- path/to/file.ext: <what to change, in one sentence>`.",
              "- `## Verdict` is one of: `approve`, `approve-with-nits`,",
              "  `request-changes`. One line, no preamble.",
              "- If a finding is speculative, mark severity `nit` and prefix",
              "  description with `(speculative)`. Do NOT invent files. If you",
              "  can't cite a real path, omit the finding.",
              "",
          ]
          if mode == "pr":
              parts += [f"## PR #{os.environ['PR_NUM']}: {os.environ['TITLE']}", "", os.environ.get("BODY") or "(empty)"]
          else:
              parts += [f"## Issue #{os.environ['ISSUE_REF']}: {os.environ['TITLE']}", "", os.environ.get("BODY") or "(empty)"]
          diff = os.environ.get("DIFF") or ""
          if diff.strip():
              parts += ["", "## Diff under review", "```diff", diff, "```"]
          else:
              parts += ["", "_No diff available; review the described change against the current codebase._"]
          print("\n".join(parts))
          PY

          # Run the OpenAI → Gemini → defer ladder. The script always exits
          # 0 and prints `ENGINE=<openai|gemini|deferred>` to stdout, which
          # we capture into a step output for downstream labelling.
          PROMPT_FILE=/tmp/prompt.txt \
          REVIEW_OUT=/tmp/review.md \
          OPENAI_MODEL="$MODEL" \
          python3 scripts/codex-review-fallback.py \
            | tee /tmp/engine.txt
          ENGINE=$(grep -oE 'ENGINE=[a-z]+' /tmp/engine.txt | tail -n1 | cut -d= -f2)
          ENGINE="${ENGINE:-deferred}"
          echo "engine=$ENGINE" >> "$GITHUB_OUTPUT"

          # Engine label tracks the script's ladder. Gemini leg defaults
          # to gemini-2.5-flash (per AI_ROUTING.md §Policy "Code review
          # on PR diff"); GEMINI_MODEL env can override.
          GEMINI_LABEL="${GEMINI_MODEL:-gemini-2.5-flash}"
          case "$ENGINE" in
            openai)  ENGINE_LABEL="Codex $MODEL" ;;
            gemini)  ENGINE_LABEL="$GEMINI_LABEL (OpenAI unavailable)" ;;
            deferred) ENGINE_LABEL="DEFERRED — both OpenAI and Gemini unavailable" ;;
            *) ENGINE_LABEL="$ENGINE" ;;
          esac
          {
            echo "## Code review ($ENGINE_LABEL)"
            echo ""
            cat /tmp/review.md
            echo ""
            echo "---"
            echo "_Posted by codex-review.yml. Review only — no code changes._"
            echo "_Auto-fix dispatcher (codex-pr-fix.yml) parses the_"
            echo "_\`## Suggested fixes\` section above to propose follow-up commits._"
          } > /tmp/comment.md

          # ── Post the review ───────────────────────────────────────────────
          if [ -n "$PR_NUM" ]; then
            gh pr comment "$PR_NUM" --repo "$REPO" --body-file /tmp/comment.md
          fi
          if [ "$MODE" = "issue" ] && [ -n "$ISSUE_REF" ]; then
            gh issue comment "$ISSUE_REF" --repo "$REPO" --body-file /tmp/comment.md
            gh issue edit "$ISSUE_REF" --repo "$REPO" \
              --add-label "status/awaiting-review" \
              --remove-label "status/planned" || true
          fi

          # ── PR labelling ──────────────────────────────────────────────────
          # Labels we apply (idempotent creates with `|| true`):
          #   codex-reviewed         — review posted (any engine)
          #   codex-reviewed-by-gemini — Gemini fallback ran instead of OpenAI
          #   codex-blockers         — review surfaced blocker/major findings
          #   review-deferred        — both engines unavailable; recheck cron
          #                            will retry once a key/quota returns
          if [ -n "$PR_NUM" ]; then
            gh label create "codex-reviewed" --repo "$REPO" \
              --color "0e8a16" --description "Codex consistency review posted" 2>/dev/null || true
            gh label create "codex-reviewed-by-gemini" --repo "$REPO" \
              --color "5319e7" --description "Review posted by Gemini fallback (OpenAI unavailable)" 2>/dev/null || true
            gh label create "codex-blockers" --repo "$REPO" \
              --color "b60205" --description "Codex flagged blocker/major findings — gates auto-merge" 2>/dev/null || true
            gh label create "review-deferred" --repo "$REPO" \
              --color "fbca04" --description "Codex/Gemini review unavailable; will be re-tried by codex-review-recheck.yml" 2>/dev/null || true

            if [ "$ENGINE" = "deferred" ]; then
              echo "Both engines unavailable; labelling PR #$PR_NUM \`review-deferred\`."
              gh pr edit "$PR_NUM" --repo "$REPO" --add-label "review-deferred" || true
              # Don't apply codex-reviewed in this case — the recheck cron
              # uses its absence to detect work that still needs reviewing.
            else
              gh pr edit "$PR_NUM" --repo "$REPO" --add-label "codex-reviewed" || true
              gh pr edit "$PR_NUM" --repo "$REPO" --remove-label "review-deferred" || true
              if [ "$ENGINE" = "gemini" ]; then
                gh pr edit "$PR_NUM" --repo "$REPO" --add-label "codex-reviewed-by-gemini" || true
              else
                gh pr edit "$PR_NUM" --repo "$REPO" --remove-label "codex-reviewed-by-gemini" || true
              fi

              BLOCKERS=$(grep -ciE '\[(blocker|major)\]' /tmp/review.md || true)
              VERDICT=$(grep -iE '^## Verdict' -A 2 /tmp/review.md | tail -n +2 | head -n 1 || true)
              if [ "${BLOCKERS:-0}" -gt 0 ] || echo "$VERDICT" | grep -qiE 'request-changes'; then
                echo "Review flagged blocker/major findings (count=$BLOCKERS, verdict=$VERDICT). Labelling \`codex-blockers\`."
                gh pr edit "$PR_NUM" --repo "$REPO" --add-label "codex-blockers" || true
              else
                echo "No blocker/major findings; not adding \`codex-blockers\`."
                gh pr edit "$PR_NUM" --repo "$REPO" --remove-label "codex-blockers" || true
              fi
            fi
          fi

          {
            echo "## Code review summary"
            echo ""
            echo "Mode: $MODE"
            echo "Engine: $ENGINE ($ENGINE_LABEL)"
            echo "Posted review on${PR_NUM:+ PR #$PR_NUM}${ISSUE_REF:+ issue #$ISSUE_REF}."
          } >> "$GITHUB_STEP_SUMMARY"
